<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<title>ATELIER AI — HOPE TEST</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace}
canvas{display:block;position:fixed;inset:0}
#hud{position:fixed;top:16px;left:20px;z-index:10;pointer-events:none}
#hud .title{font-size:14px;font-weight:700;letter-spacing:3px;color:#fff;text-transform:uppercase}
#hud .sub{font-size:8px;letter-spacing:3px;color:rgba(255,255,255,0.4);margin-top:4px;text-transform:uppercase}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="title">HOPE TEST</div>
  <div class="sub" id="sub">Farfalla · Razzo · Mondo</div>
</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x060010);
scene.fog=new THREE.FogExp2(0x0a0020,0.018);

const camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,.01,300);
camera.position.set(0,2,13);
camera.lookAt(0,0,0);

const L1=new THREE.SpotLight(0xbb00ff,600,50,.28,.2);
L1.position.set(5,7,10);L1.castShadow=true;scene.add(L1);
const L2=new THREE.SpotLight(0xff0088,350,40,.4,.3);
L2.position.set(-6,-4,7);scene.add(L2);
scene.add(new THREE.AmbientLight(0x111111));

// ── SFERA BLOB ──
const matCore=new THREE.MeshStandardMaterial({color:new THREE.Color(0.22,0.04,0.48),roughness:0.12,metalness:0.05,emissive:new THREE.Color(0.14,0.0,0.35),emissiveIntensity:0.4});
const matBub=new THREE.MeshStandardMaterial({color:new THREE.Color(0.22,0.04,0.48),roughness:0.10,metalness:0.04,emissive:new THREE.Color(0.14,0.0,0.35),emissiveIntensity:0.3});
const base=new THREE.Group();scene.add(base);
base.add(new THREE.Mesh(new THREE.SphereGeometry(2.2,64,48),matCore));
const blobData=[];
for(let i=0;i<160;i++){
  const phi=Math.acos(1-2*(i+0.5)/160);
  const theta=Math.PI*(1+Math.sqrt(5))*i;
  const r=0.03+Math.pow(Math.random(),1.6)*0.42;
  const dist=2.2+r*0.85;
  const nx=Math.sin(phi)*Math.cos(theta),ny=Math.cos(phi),nz=Math.sin(phi)*Math.sin(theta);
  const m=new THREE.Mesh(new THREE.SphereGeometry(r,14,10),matBub);
  m.position.set(nx*dist,ny*dist,nz*dist);
  base.add(m);
  blobData.push({m,nx,ny,nz,dist,ph:i*0.07,sp:0.3+Math.random()*1.2,amp:0.015+Math.random()*0.04});
}

// ── FARFALLA ──
function makeButterfly(){
  const g=new THREE.Group();
  function makeWing(side){
    const cv=document.createElement('canvas');
    cv.width=256;cv.height=256;
    const ctx=cv.getContext('2d');
    ctx.clearRect(0,0,256,256);
    ctx.beginPath();
    if(side===1){
      ctx.moveTo(128,128);
      ctx.bezierCurveTo(200,80,240,20,180,10);
      ctx.bezierCurveTo(120,0,80,60,128,128);
      ctx.moveTo(128,128);
      ctx.bezierCurveTo(200,160,220,220,170,230);
      ctx.bezierCurveTo(120,240,90,190,128,128);
    } else {
      ctx.moveTo(128,128);
      ctx.bezierCurveTo(56,80,16,20,76,10);
      ctx.bezierCurveTo(136,0,176,60,128,128);
      ctx.moveTo(128,128);
      ctx.bezierCurveTo(56,160,36,220,86,230);
      ctx.bezierCurveTo(136,240,166,190,128,128);
    }
    const grad=ctx.createRadialGradient(128,128,5,128,128,120);
    grad.addColorStop(0,'rgba(255,200,255,0.95)');
    grad.addColorStop(0.5,'rgba(180,80,255,0.80)');
    grad.addColorStop(1,'rgba(100,0,200,0.15)');
    ctx.fillStyle=grad;
    ctx.fill();
    const tex=new THREE.CanvasTexture(cv);
    const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,side:THREE.DoubleSide,depthWrite:false});
    const mesh=new THREE.Mesh(new THREE.PlaneGeometry(2.2,2.2),mat);
    mesh.position.x=side===1?0.5:-0.5;
    return mesh;
  }
  g.add(makeWing(1));
  g.add(makeWing(-1));
  const body=new THREE.Mesh(new THREE.CylinderGeometry(0.035,0.055,0.7,8),
    new THREE.MeshStandardMaterial({color:0x220033,roughness:0.3}));
  g.add(body);
  return g;
}
const butterfly=makeButterfly();
butterfly.position.set(5,3,2);
butterfly.lookAt(0,0,0);
scene.add(butterfly);

// ── RAZZO SPAZIALE — forma Falcon/Ariane ──
function makeRocket(){
  const g=new THREE.Group();
  const matWhite=new THREE.MeshStandardMaterial({color:0xf0f0f0,roughness:0.15,metalness:0.85});
  const matDark=new THREE.MeshStandardMaterial({color:0x333333,roughness:0.2,metalness:0.9});
  const matAccent=new THREE.MeshStandardMaterial({color:0xcc2200,roughness:0.2,metalness:0.7});

  // Corpo principale — lungo e stretto
  g.add(new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.14,3.5,16),matWhite));

  // Ogiva conica appuntita
  const nose=new THREE.Mesh(new THREE.ConeGeometry(0.12,1.0,16),matWhite);
  nose.position.y=2.25;g.add(nose);

  // Fascia colorata
  const band=new THREE.Mesh(new THREE.CylinderGeometry(0.125,0.125,0.18,16),matAccent);
  band.position.y=1.4;g.add(band);

  // Finestra circolare
  const win=new THREE.Mesh(new THREE.CircleGeometry(0.055,12),
    new THREE.MeshBasicMaterial({color:0x88ccff}));
  win.position.set(0.13,1.0,0);win.rotation.y=Math.PI/2;g.add(win);

  // Stadio inferiore leggermente più largo
  const stage2=new THREE.Mesh(new THREE.CylinderGeometry(0.14,0.16,1.2,16),matDark);
  stage2.position.y=-2.35;g.add(stage2);

  // Separazione stadi
  const sep=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.15,0.06,16),matAccent);
  sep.position.y=-1.72;g.add(sep);

  // 4 alette grid-fin in cima allo stadio inferiore
  for(let i=0;i<4;i++){
    const fin=new THREE.Mesh(new THREE.BoxGeometry(0.35,0.28,0.025),matDark);
    fin.position.set(Math.cos(i*Math.PI/2)*0.18,-1.9,Math.sin(i*Math.PI/2)*0.18);
    fin.rotation.y=i*Math.PI/2;
    g.add(fin);
  }

  // 4 alette base
  for(let i=0;i<4;i++){
    const fin=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.5,0.02),matDark);
    fin.position.set(Math.cos(i*Math.PI/2)*0.2,-2.7,Math.sin(i*Math.PI/2)*0.2);
    fin.rotation.y=i*Math.PI/2;
    g.add(fin);
  }

  // Motori — cluster 3
  const enginePositions=[[-0.08,0,0],[0.04,0,0.07],[0.04,0,-0.07]];
  enginePositions.forEach(([ex,ey,ez])=>{
    const eng=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.03,0.2,8),matDark);
    eng.position.set(ex,-2.97,ez);g.add(eng);
  });

  // Fiamma principale
  const flame=new THREE.Mesh(new THREE.ConeGeometry(0.13,0.9,8),
    new THREE.MeshStandardMaterial({color:0xff6600,emissive:0xff4400,emissiveIntensity:1.5,roughness:0.05,transparent:true,opacity:0.9}));
  flame.position.y=-3.4;flame.rotation.x=Math.PI;g.add(flame);

  const flame2=new THREE.Mesh(new THREE.ConeGeometry(0.07,0.6,8),
    new THREE.MeshStandardMaterial({color:0xffff00,emissive:0xffdd00,emissiveIntensity:2.0,roughness:0.05,transparent:true,opacity:0.85}));
  flame2.position.y=-3.7;flame2.rotation.x=Math.PI;g.add(flame2);

  const flame3=new THREE.Mesh(new THREE.ConeGeometry(0.03,0.4,6),
    new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:2.5,roughness:0.0,transparent:true,opacity:0.7}));
  flame3.position.y=-3.9;flame3.rotation.x=Math.PI;g.add(flame3);

  return g;
}

const rocket=makeRocket();
// Parte dalla sfera — posizione iniziale sulla superficie
rocket.position.set(0.5,2.2,0); // top della sfera
rocket.rotation.z=0.1; // leggermente inclinato
scene.add(rocket);

// Stato lancio
let rocketLaunched=false;
let rocketDone=false;
let launchDelay=180; // frame prima del lancio (6 secondi circa)
let rocketY=2.2;
let rocketSpeed=0;

let t=0;
let frame=0;

function animate(){
  requestAnimationFrame(animate);
  t+=0.012;
  frame++;

  // Sfera blob
  base.rotation.y=t*0.06;
  base.rotation.x=Math.sin(t*0.03)*0.04;
  blobData.forEach(b=>{
    const pulse=Math.sin(t*b.sp+b.ph)*b.amp;
    const d=b.dist+pulse;
    b.m.position.set(b.nx*d,b.ny*d,b.nz*d);
    b.m.scale.setScalar(1+Math.abs(pulse)*0.8);
  });

  // Farfalla — sbatte ali + float
  const wL=butterfly.children[0], wR=butterfly.children[1];
  const flap=Math.abs(Math.sin(t*3.5))*0.55;
  if(wL)wL.rotation.y=-flap;
  if(wR)wR.rotation.y=flap;
  butterfly.position.y=3+Math.sin(t*0.35)*0.18;
  butterfly.position.x=5+Math.sin(t*0.18)*0.12;

  // RAZZO — lancio progressivo
  if(!rocketDone){
    if(frame<launchDelay){
      // Attesa sulla sfera — vibrazione pre-lancio
      const vib=(frame>launchDelay-40)?Math.sin(frame*0.8)*0.012:0;
      rocket.position.x=0.5+vib;
      // Fiamma pre-lancio piccola
      const flames=rocket.children.slice(-3);
      flames.forEach(f=>{if(f.material)f.material.emissiveIntensity=0.3+Math.sin(t*10)*0.2;});
    } else {
      // LANCIO
      if(!rocketLaunched){
        rocketLaunched=true;
        document.getElementById('sub').textContent='🚀 Lancio!';
      }
      rocketSpeed+=0.004; // accelerazione
      rocketY+=rocketSpeed;
      rocket.position.y=rocketY;
      rocket.position.x=0.5+Math.sin(t*0.5)*0.05;
      // Inclina verso l'alto
      rocket.rotation.z=Math.max(0, 0.1-rocketSpeed*0.5);

      // Fiamma pulsante durante volo
      const flames=rocket.children.slice(-3);
      flames.forEach((f,i)=>{
        if(f.material){
          f.material.emissiveIntensity=1.5+Math.sin(t*(8+i*2))*0.5;
          f.scale.y=0.9+Math.sin(t*(6+i))*0.3;
        }
      });

      // Sparisce quando esce dallo schermo
      if(rocketY>25){
        scene.remove(rocket);
        rocketDone=true;
        document.getElementById('sub').textContent='Farfalla · Razzo uscito · Mondo';
      }
    }
  }

  L1.intensity=550+Math.sin(t*0.9)*100;
  camera.position.x=Math.sin(t*0.03)*0.5;
  camera.position.y=2+Math.cos(t*0.025)*0.3;
  camera.lookAt(0,0,0);
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
