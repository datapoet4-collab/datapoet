<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"/><style>*{margin:0;padding:0}body{overflow:hidden;background:#000}</style></head>
<body>
<script type="module">
import * as THREE from '/three.module.js';
const W=window.innerWidth,H=window.innerHeight;
const renderer=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x000000,1);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,W/H,.1,200);
camera.position.set(0,0,8);

// LUCI — drammatiche, creano ombre profonde
const L1=new THREE.SpotLight(0xffffff,300,50,.4,.3);
L1.position.set(5,7,8);L1.castShadow=true;
L1.shadow.mapSize.set(2048,2048);scene.add(L1);
const L2=new THREE.SpotLight(0xff1100,150,40,.5,.4);
L2.position.set(-6,-4,5);scene.add(L2);
const L3=new THREE.PointLight(0xffffff,80,30);
L3.position.set(0,5,-3);scene.add(L3);
const L4=new THREE.PointLight(0xff0000,60,25);
L4.position.set(0,-5,2);scene.add(L4);
scene.add(new THREE.AmbientLight(0x050505));

const world=new THREE.Group();
scene.add(world);

function gM(v,r){return new THREE.MeshStandardMaterial({color:new THREE.Color(v,v,v),roughness:r||.07,metalness:.95});}
function rM(ei){return new THREE.MeshStandardMaterial({color:0xff0000,emissive:0xff0000,emissiveIntensity:ei||.8,roughness:.03,metalness:.97});}
function gldM(){return new THREE.MeshStandardMaterial({color:0xffcc00,emissive:0xffaa00,emissiveIntensity:.5,roughness:.06,metalness:.95});}
function dkM(){return new THREE.MeshStandardMaterial({color:0x080808,roughness:.15,metalness:.9});}

const all=[];

// tutto nello spazio — distribuzione random ma densa
function spawn(geo,mat,scale){
  const m=new THREE.Mesh(geo,mat);
  m.castShadow=true;
  m.receiveShadow=true;
  // distribuisci in tutto lo spazio visibile
  m.position.set(
    (Math.random()-.5)*16,
    (Math.random()-.5)*12,
    (Math.random()-.5)*8-1
  );
  m.rotation.set(Math.random()*6.28,Math.random()*6.28,Math.random()*6.28);
  if(scale) m.scale.setScalar(scale);
  world.add(m);
  return m;
}

// ===== CUSPIDI LUNGHE — elemento dominante =====
// tante, di dimensioni diverse, in tutto il display
for(let i=0;i<300;i++){
  const len=.1+Math.random()*3.5+Math.random()*Math.random()*3; // bias verso lunghe
  const r=.004+Math.random()*.025;
  const bright=Math.random();
  let mat;
  if(bright<.15) mat=rM(.9+Math.random()*.1);
  else if(bright<.22) mat=gldM();
  else if(bright<.5) mat=gM(.8+Math.random()*.2,.05);
  else mat=gM(.04+Math.random()*.12,.1);
  const m=spawn(new THREE.ConeGeometry(r,len,4),mat);
  all.push({m,
    // movimento proprio su 3 assi indipendenti
    rx:(Math.random()-.5)*.028*(1+Math.random()),
    ry:(Math.random()-.5)*.045*(1+Math.random()),
    rz:(Math.random()-.5)*.02*(1+Math.random()),
    ox:m.position.x,oy:m.position.y,oz:m.position.z,
    // 3 frequenze diverse — movimento caotico
    f1:.1+Math.random()*.4,f2:.15+Math.random()*.35,f3:.08+Math.random()*.3,
    a1:.2+Math.random()*1.5,a2:.15+Math.random()*1,a3:.1+Math.random()*.8,
    p1:Math.random()*6.28,p2:Math.random()*6.28,p3:Math.random()*6.28,
    // scala pulsante
    sv:Math.random()*.8+.2,spv:.3+Math.random()*.8,sph:Math.random()*6.28,
    type:'cone',
    hasEmit:bright<.22
  });
}

// ===== PIASTRE/LASTRE — PAK style =====
for(let i=0;i<80;i++){
  const w=.08+Math.random()*2.5+Math.random()*Math.random()*2;
  const h=.08+Math.random()*2.5+Math.random()*Math.random()*2;
  const d=.008+Math.random()*.06;
  const bright=Math.random()<.45;
  const isRed=Math.random()<.12;
  const mat=isRed?rM(.5):gM(bright?.82+Math.random()*.18:.04+Math.random()*.14,.05+Math.random()*.1);
  const m=spawn(new THREE.BoxGeometry(w,h,d),mat);
  all.push({m,
    rx:(Math.random()-.5)*.015,ry:(Math.random()-.5)*.022,rz:(Math.random()-.5)*.012,
    ox:m.position.x,oy:m.position.y,oz:m.position.z,
    f1:.08+Math.random()*.25,f2:.1+Math.random()*.2,f3:.06+Math.random()*.18,
    a1:.3+Math.random()*1.2,a2:.2+Math.random()*.8,a3:.15+Math.random()*.6,
    p1:Math.random()*6.28,p2:Math.random()*6.28,p3:Math.random()*6.28,
    sv:0,type:'plate',hasEmit:isRed
  });
}

// ===== BARRE METALLICHE — struttura =====
for(let i=0;i<120;i++){
  const len=.1+Math.random()*4+Math.random()*Math.random()*3;
  const r=.006+Math.random()*.035;
  const bright=Math.random();
  let mat;
  if(bright<.12) mat=rM(.7+Math.random()*.3);
  else if(bright<.18) mat=gldM();
  else if(bright<.48) mat=gM(.78+Math.random()*.22,.05);
  else mat=gM(.03+Math.random()*.1,.08);
  const m=spawn(new THREE.CylinderGeometry(r,r,len,6),mat);
  all.push({m,
    rx:(Math.random()-.5)*.02,ry:(Math.random()-.5)*.03,rz:(Math.random()-.5)*.016,
    ox:m.position.x,oy:m.position.y,oz:m.position.z,
    f1:.09+Math.random()*.3,f2:.12+Math.random()*.25,f3:.07+Math.random()*.2,
    a1:.25+Math.random()*1.3,a2:.18+Math.random()*.9,a3:.12+Math.random()*.7,
    p1:Math.random()*6.28,p2:Math.random()*6.28,p3:Math.random()*6.28,
    sv:Math.random()*.5,spv:.2+Math.random()*.6,sph:Math.random()*6.28,
    type:'bar',hasEmit:bright<.18
  });
}

// ===== SFERE DEFORMATE — PAK =====
for(let i=0;i<40;i++){
  const r=.05+Math.random()*.4+Math.random()*Math.random()*.5;
  const geo=new THREE.SphereGeometry(r,20,14);
  const pos=geo.attributes.position;
  const freq=8+Math.random()*12,amp=.04+Math.random()*.08;
  for(let j=0;j<pos.count;j++){
    const n=(Math.sin(pos.getX(j)*freq+pos.getY(j)*freq*.8)*Math.cos(pos.getZ(j)*freq*.9))*amp;
    pos.setXYZ(j,pos.getX(j)+n,pos.getY(j)+n*.7,pos.getZ(j)+n*.85);
  }
  geo.computeVertexNormals();
  const isR=Math.random()<.12;
  const mat=isR?rM(.4):gM(Math.random()<.45?.75+Math.random()*.25:.04+Math.random()*.1,.06+Math.random()*.1);
  const m=spawn(geo,mat);
  all.push({m,
    rx:(Math.random()-.5)*.018,ry:(Math.random()-.5)*.025,rz:(Math.random()-.5)*.014,
    ox:m.position.x,oy:m.position.y,oz:m.position.z,
    f1:.07+Math.random()*.2,f2:.09+Math.random()*.18,f3:.06+Math.random()*.15,
    a1:.2+Math.random()*1,a2:.15+Math.random()*.7,a3:.1+Math.random()*.5,
    p1:Math.random()*6.28,p2:Math.random()*6.28,p3:Math.random()*6.28,
    sv:0,type:'sphere',hasEmit:isR
  });
}

// ===== MICRO DETTAGLI — bulloni, pin, elementi piccoli =====
for(let i=0;i<200;i++){
  const type=Math.floor(Math.random()*3);
  let geo,mat;
  if(type===0){
    const r=.008+Math.random()*.025;
    geo=new THREE.CylinderGeometry(r*1.8,r*1.8,.04,8);
    mat=gM(.7+Math.random()*.3,.05);
  } else if(type===1){
    const s=.015+Math.random()*.04;
    geo=new THREE.BoxGeometry(s,s,s);
    const isR=Math.random()<.25;
    mat=isR?rM(.6):gM(Math.random()<.5?.85:'.1'<'.5'?.85:.08,.06);
  } else {
    geo=new THREE.CylinderGeometry(.006,.006,.08+Math.random()*.15,6);
    mat=gM(.6+Math.random()*.4,.04);
  }
  const m=spawn(geo,mat,.8+Math.random()*.4);
  all.push({m,
    rx:(Math.random()-.5)*.04,ry:(Math.random()-.5)*.06,rz:(Math.random()-.5)*.035,
    ox:m.position.x,oy:m.position.y,oz:m.position.z,
    f1:.15+Math.random()*.5,f2:.18+Math.random()*.45,f3:.12+Math.random()*.4,
    a1:.3+Math.random()*1.5,a2:.25+Math.random()*1.2,a3:.2+Math.random()*1,
    p1:Math.random()*6.28,p2:Math.random()*6.28,p3:Math.random()*6.28,
    sv:0,type:'micro',hasEmit:false
  });
}

// CAMBIO COLORE SHOCK
let cT=0,cN=8+Math.random()*8,cS=0;
const CS=[
  {bg:0x000000,l1c:0xffffff,l2c:0xff1100,l3c:0xffffff,l4c:0xff0000},
  {bg:0x010000,l1c:0xffffff,l2c:0xff4400,l3c:0xffddaa,l4c:0xff2200},
  {bg:0x000005,l1c:0xaabbff,l2c:0x2244ff,l3c:0x8899ff,l4c:0x4466ff},
  {bg:0x030200,l1c:0xffffff,l2c:0xffcc00,l3c:0xffeeaa,l4c:0xff8800},
  {bg:0x000000,l1c:0xffffff,l2c:0x00ffaa,l3c:0xaaffdd,l4c:0x00ff88},
];
function swC(){
  cS=(cS+1)%CS.length;
  renderer.setClearColor(CS[cS].bg,1);
  L1.color.set(CS[cS].l1c);L2.color.set(CS[cS].l2c);
  L3.color.set(CS[cS].l3c);L4.color.set(CS[cS].l4c);
  cT=0;cN=7+Math.random()*10;
}

let t=0;
function animate(){
  requestAnimationFrame(animate);
  t+=.016;cT+=.016;
  if(cT>cN)swC();

  all.forEach(o=>{
    // ROTAZIONE PROPRIA — ogni elemento gira diversamente
    o.m.rotation.x+=o.rx;
    o.m.rotation.y+=o.ry;
    o.m.rotation.z+=o.rz;

    // POSIZIONE — 3 onde indipendenti = movimento caotico
    o.m.position.x=o.ox+Math.sin(t*o.f1+o.p1)*o.a1+Math.cos(t*o.f2*.7+o.p2)*o.a2*.3;
    o.m.position.y=o.oy+Math.cos(t*o.f2+o.p2)*o.a2+Math.sin(t*o.f3*.8+o.p3)*o.a1*.25;
    o.m.position.z=o.oz+Math.sin(t*o.f3+o.p3)*o.a3+Math.cos(t*o.f1*.6+o.p1)*o.a3*.2;

    // SCALA — cuspidi si allungano e accorciano
    if(o.sv>0){
      const sc=Math.max(.05,1+Math.sin(t*o.spv+o.sph)*o.sv);
      if(o.type==='cone') o.m.scale.y=sc;
      else if(o.type==='bar'){o.m.scale.y=sc;o.m.scale.x=1+Math.sin(t*o.spv*.7+o.sph)*.15;o.m.scale.z=1+Math.sin(t*o.spv*.7+o.sph)*.15;}
    }

    // EMISSIONE pulsante
    if(o.hasEmit&&o.m.material.emissiveIntensity!==undefined)
      o.m.material.emissiveIntensity=.55+Math.sin(t*2.5+o.p1)*.35;
  });

  // WORLD — rotazione lenta, tutto si muove come sistema unico
  world.rotation.y+=.003;
  world.rotation.x=Math.sin(t*.04)*.05;
  world.rotation.z=Math.cos(t*.032)*.025;

  // LUCI animate
  L1.position.set(5+Math.sin(t*.12)*3,7+Math.cos(t*.09)*2,8);
  L1.intensity=260+Math.sin(t*1.1)*60;
  L2.position.set(-6+Math.cos(t*.1)*3,-4+Math.sin(t*.08)*2,5);
  L2.intensity=130+Math.cos(t*.9)*40;
  L3.position.set(Math.sin(t*.07)*4,5+Math.cos(t*.06)*2,-3);
  L4.position.set(Math.cos(t*.09)*3,-5+Math.sin(t*.07)*2,2);

  // CAMERA — si muove lentamente
  camera.position.x=Math.sin(t*.016)*1.5;
  camera.position.y=Math.cos(t*.013)*.6;
  camera.position.z=8+Math.sin(t*.02)*.5;
  camera.lookAt(0,0,0);
  renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
