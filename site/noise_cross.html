<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace}
#wrap{position:relative;width:600px;height:900px;flex-shrink:0}
canvas{display:block;width:600px!important;height:900px!important}
#hud{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#wm{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:5px;letter-spacing:5px;color:rgba(255,255,255,.12);white-space:nowrap}
#controls{margin-top:12px;display:flex;gap:10px;align-items:center}
#btnRec,#btnStop{font-family:'Courier New',monospace;font-size:7px;letter-spacing:3px;padding:5px 14px;border:1px solid rgba(255,255,255,.18);background:transparent;color:rgba(255,255,255,.45);cursor:pointer}
#btnRec:hover{background:#ff2200;border-color:#ff2200;color:#fff}
#btnStop{opacity:.2;pointer-events:none}
#btnStop.active{opacity:1;pointer-events:all;color:#fff}
#recStatus{font-size:6px;letter-spacing:3px;color:#ff2200;min-width:55px}
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div id="wm">DATA POET · NOISE · 10/04/2026</div>
  </div>
</div>
<div id="controls">
  <button id="btnRec">⏺ REC 30s</button>
  <button id="btnStop">⏹ STOP</button>
  <span id="recStatus"></span>
</div>

<script type="module">
import * as THREE from 'three';

// render interno 1200x1800 — pixelRatio 2 = 2400x3600 reali
const RW=1200,RH=1800;
const renderer=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
renderer.setSize(RW,RH);
renderer.setPixelRatio(2);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=2.2;
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;

const canvas=renderer.domElement;
canvas.style.width='600px';
canvas.style.height='900px';
document.getElementById('wrap').prepend(canvas);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x000000);

const camera=new THREE.PerspectiveCamera(50,RW/RH,0.01,500);
camera.position.set(0,0,18);camera.lookAt(0,0,0);

scene.add(new THREE.AmbientLight(0xffffff,.5));
const key=new THREE.SpotLight(0xffffff,3000,300,Math.PI/6,.005);
key.position.set(12,18,14);key.castShadow=true;
key.shadow.mapSize.set(4096,4096);key.shadow.bias=-.001;
scene.add(key);scene.add(key.target);
const fill=new THREE.DirectionalLight(0xffffff,.4);fill.position.set(-10,4,8);scene.add(fill);
const rim=new THREE.SpotLight(0xffffff,1500,300,Math.PI/8,.0);
rim.position.set(-6,22,-18);scene.add(rim);scene.add(rim.target);
const bot=new THREE.DirectionalLight(0xffffff,.3);bot.position.set(0,-15,5);scene.add(bot);

// TEXTURE — identiche noise_pak
function makeTex(type){
  const s=512;const d=new Uint8Array(s*s*4);
  for(let i=0;i<s*s;i++){
    const x=i%s,y=Math.floor(i/s);let v=128;
    if(type==='concrete'){v=80+Math.random()*110;if(Math.sin(x*.06)*Math.cos(y*.09)>.82)v=Math.max(20,v-70);if(Math.random()>.96)v=Math.max(10,v-90);}
    else if(type==='metal'){v=110+Math.sin(y*.9+x*.015)*65+Math.random()*25;if(Math.random()>.98)v=Math.min(255,v+90);}
    else if(type==='rubber'){v=22+Math.random()*35;if(Math.random()>.88)v+=18;}
    else if(type==='marble'){const vn=Math.sin(x*.05+Math.sin(y*.08)*3)*Math.cos(y*.04)*128+128;v=Math.round(vn*.4+90+Math.random()*30);}
    d[i*4]=v;d[i*4+1]=v;d[i*4+2]=v;d[i*4+3]=255;
  }
  const t=new THREE.DataTexture(d,s,s,THREE.RGBAFormat);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(3,3);t.needsUpdate=true;return t;
}
const TX={c:makeTex('concrete'),m:makeTex('metal'),r:makeTex('rubber'),w:makeTex('marble')};
const mC=(col=0x555555)=>new THREE.MeshStandardMaterial({color:col,roughness:.97,metalness:.02,map:TX.c,roughnessMap:TX.c,bumpMap:TX.c,bumpScale:.08});
const mM=(col=0xaaaaaa)=>new THREE.MeshStandardMaterial({color:col,roughness:.06,metalness:.99,map:TX.m,roughnessMap:TX.m});
const mR=()=>new THREE.MeshStandardMaterial({color:0x0d0d0d,roughness:.99,metalness:.0,map:TX.r,roughnessMap:TX.r,bumpMap:TX.r,bumpScale:.03});
const mW=(col=0xdddddd)=>new THREE.MeshStandardMaterial({color:col,roughness:.88,metalness:.03,map:TX.w,roughnessMap:TX.w,bumpMap:TX.w,bumpScale:.05});
const G=()=>new THREE.Group();
const M=(geo,mat)=>{const o=new THREE.Mesh(geo,mat);o.castShadow=true;o.receiveShadow=true;return o;};

// ── CROCE — unico oggetto, 3 varianti che mutano ──────────────────────────
// Variante 0: croce greca — bracci uguali, cemento massiccio
// Variante 1: croce latina — braccio lungo, marmo
// Variante 2: croce gotica — bracci affilati, metallo
// Variante 3: croce frammentata — pezzi esplosi, gomma
// Variante 4: croce energetica — tubi e sfere, cromo
// Variante 5: croce anatomica — figure umane che formano la croce

function buildCrossGreek(){
  const g=G();const S=2.2;
  // braccio verticale
  const vert=M(new THREE.BoxGeometry(.9*S,4.5*S,.7*S,8,36,6),mC(0x555555));g.add(vert);
  // braccio orizzontale
  const horiz=M(new THREE.BoxGeometry(4.5*S,.9*S,.7*S,36,8,6),mC(0x444444));g.add(horiz);
  // nodo centrale
  const node=M(new THREE.BoxGeometry(1.0*S,1.0*S,.85*S,8,8,6),mW(0xdddddd));g.add(node);
  // dettaglio bordi
  const edgeV=M(new THREE.BoxGeometry(.95*S,4.6*S,.08*S,6,36,1),mM(0x888888));edgeV.position.z=.39*S;g.add(edgeV);
  const edgeH=M(new THREE.BoxGeometry(4.6*S,.95*S,.08*S,36,6,1),mM(0x888888));edgeH.position.z=.39*S;g.add(edgeH);
  // terminali bracci
  [[0,2.25],[0,-2.25],[2.25,0],[-2.25,0]].forEach(([x,y])=>{
    const cap=M(new THREE.BoxGeometry(.95*S,.95*S,.9*S,6,6,6),mM(0x777777));cap.position.set(x*S,y*S,0);g.add(cap);
  });
  return g;
}

function buildCrossLatin(){
  const g=G();const S=2.0;
  // braccio verticale lungo
  const vert=M(new THREE.BoxGeometry(.75*S,5.5*S,.6*S,6,44,5),mW(0xffffff));g.add(vert);
  // braccio orizzontale corto — a 1/3 dall'alto
  const horiz=M(new THREE.BoxGeometry(3.8*S,.75*S,.6*S,30,6,5),mW(0xeeeeee));horiz.position.y=1.2*S;g.add(horiz);
  // modanature
  const baseW=M(new THREE.BoxGeometry(.9*S,5.6*S,.12*S,6,44,1),mM(0xaaaaaa));baseW.position.z=.36*S;g.add(baseW);
  const baseH=M(new THREE.BoxGeometry(3.9*S,.9*S,.12*S,30,6,1),mM(0xaaaaaa));baseH.position.set(0,1.2*S,.36*S);g.add(baseH);
  // piedistallo
  const base=M(new THREE.BoxGeometry(1.1*S,.35*S,.75*S,8,3,5),mC(0x666666));base.position.y=-2.93*S;g.add(base);
  const base2=M(new THREE.BoxGeometry(1.5*S,.2*S,.9*S,10,2,6),mC(0x555555));base2.position.y=-3.18*S;g.add(base2);
  // nervature verticali
  [-1,1].forEach(sx=>{
    const rib=M(new THREE.BoxGeometry(.06*S,5.4*S,.08*S,1,40,1),mM(0xcccccc));rib.position.set(sx*.3*S,0,.37*S);g.add(rib);
  });
  return g;
}

function buildCrossGothic(){
  const g=G();const S=2.1;
  // braccio verticale — affilato, rastremato
  const vert=M(new THREE.CylinderGeometry(.18*S,.45*S,5.2*S,4,32),mM(0xdddddd));vert.rotation.y=Math.PI/4;g.add(vert);
  // braccio orizzontale
  const horiz=M(new THREE.CylinderGeometry(.18*S,.35*S,4.0*S,4,24),mM(0xcccccc));horiz.rotation.z=Math.PI/2;horiz.rotation.x=Math.PI/4;horiz.position.y=.8*S;g.add(horiz);
  // punta superiore
  const tipTop=M(new THREE.ConeGeometry(.2*S,.9*S,4,8),mM(0xffffff));tipTop.rotation.y=Math.PI/4;tipTop.position.y=2.95*S;g.add(tipTop);
  // punte laterali
  [-1,1].forEach(sx=>{
    const tipH=M(new THREE.ConeGeometry(.16*S,.6*S,4,6),mM(0xeeeeee));
    tipH.rotation.z=sx*Math.PI/2;tipH.rotation.y=Math.PI/4;
    tipH.position.set(sx*2.3*S,.8*S,0);g.add(tipH);
  });
  // nodo centrale — ottaedro
  const node=M(new THREE.OctahedronGeometry(.4*S,2),mW(0xffffff));node.position.y=.8*S;g.add(node);
  // dettaglio trafori
  for(let i=0;i<8;i++){
    const traf=M(new THREE.CylinderGeometry(.04*S,.04*S,.3*S,6,2),mM(0x888888));
    traf.rotation.y=Math.PI/4;
    traf.position.set(0,(-1.5+i*.5)*S,.35*S);g.add(traf);
  }
  return g;
}

function buildCrossFragment(){
  const g=G();const S=1.8;
  // croce base spezzata — pezzi distaccati con rotazioni
  const frags=[
    {pos:[0,1.8,0],   rot:[.08,0,.04],    geo:new THREE.BoxGeometry(.85*S,1.6*S,.65*S,6,12,5)},
    {pos:[0,-.5,-.2], rot:[-.12,.05,-.06],geo:new THREE.BoxGeometry(.85*S,1.8*S,.65*S,6,14,5)},
    {pos:[0,-2.2,.1], rot:[.18,0,.12],    geo:new THREE.BoxGeometry(.85*S,1.2*S,.65*S,6,10,5)},
    {pos:[1.4,.6,.1], rot:[.05,.08,-.1],  geo:new THREE.BoxGeometry(1.6*S,.85*S,.65*S,12,6,5)},
    {pos:[-1.4,.6,-.1],rot:[-.06,-.04,.1],geo:new THREE.BoxGeometry(1.5*S,.85*S,.65*S,12,6,5)},
  ];
  frags.forEach((f,i)=>{
    const mesh=M(f.geo,i%2===0?mC(0x444444):mR());
    mesh.position.set(f.pos[0]*S,f.pos[1]*S,f.pos[2]*S);
    mesh.rotation.set(f.rot[0],f.rot[1],f.rot[2]);g.add(mesh);
  });
  // schegge sparse
  for(let i=0;i<16;i++){
    const sh=M(new THREE.BoxGeometry((.08+Math.random()*.35)*S,(.06+Math.random()*.28)*S,(.05+Math.random()*.2)*S,3,3,2),
      i%3===0?mM(0x888888):mC(0x333333));
    sh.position.set((Math.random()-.5)*4*S,(Math.random()-.5)*4.5*S,(Math.random()-.5)*1.2*S);
    sh.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,Math.random()*Math.PI);g.add(sh);
  }
  // crepe
  for(let i=0;i<6;i++){
    const crack=M(new THREE.BoxGeometry(.03*S,(.4+Math.random()*.8)*S,.03*S,1,6,1),mR());
    crack.position.set((Math.random()-.5)*1.2*S,(Math.random()-.5)*2*S,.34*S);
    crack.rotation.z=(Math.random()-.5)*.8;g.add(crack);
  }
  return g;
}

function buildCrossEnergy(){
  const g=G();const S=2.0;
  // struttura tubolare
  // asse verticale — tubo
  const vTube=M(new THREE.CylinderGeometry(.12*S,.12*S,5.0*S,16,32),mM(0xffffff));g.add(vTube);
  // asse orizzontale
  const hTube=M(new THREE.CylinderGeometry(.12*S,.12*S,4.2*S,16,24),mM(0xeeeeee));hTube.rotation.z=Math.PI/2;hTube.position.y=.9*S;g.add(hTube);
  // nodi sfere agli estremi
  [[0,2.5],[0,-2.5],[2.1,.9],[-2.1,.9]].forEach(([x,y])=>{
    const node=M(new THREE.SphereGeometry(.28*S,24,24),mW(0xffffff));node.position.set(x*S,y*S,0);g.add(node);
  });
  // nodo centrale grande
  const center=M(new THREE.SphereGeometry(.42*S,32,32),mM(0xdddddd));center.position.y=.9*S;g.add(center);
  // anelli decorativi lungo i tubi
  [1.5,.5,-.5,-1.5].forEach(y=>{
    const ring=M(new THREE.TorusGeometry(.18*S,.04*S,12,32),mM(0xaaaaaa));ring.position.y=y*S;g.add(ring);
  });
  [-1.5,0,1.5].forEach(x=>{
    const ring=M(new THREE.TorusGeometry(.18*S,.04*S,12,32),mM(0x999999));ring.rotation.z=Math.PI/2;ring.position.set(x*S,.9*S,0);g.add(ring);
  });
  // raggi luminosi — cilindri sottili che irradiano
  for(let i=0;i<12;i++){
    const ang=i/12*Math.PI*2;
    const ray=M(new THREE.CylinderGeometry(.02*S,.005*S,1.2*S,6,4),mM(0xffffff));
    ray.position.set(Math.cos(ang)*.8*S,.9*S,Math.sin(ang)*.8*S);
    ray.rotation.z=ang+Math.PI/2;ray.rotation.x=Math.PI/2;g.add(ray);
  }
  return g;
}

function buildCrossHuman(){
  const g=G();const S=1.6;
  // figura centrale — braccio verticale della croce
  // testa
  const head=M(new THREE.SphereGeometry(.42*S,32,32),mW(0xdddddd));head.position.y=2.8*S;g.add(head);
  // corpo allungato
  const torso=M(new THREE.BoxGeometry(.65*S,2.2*S,.4*S,6,18,4),mW(0xcccccc));torso.position.y=1.1*S;g.add(torso);
  // gambe unite — braccio basso della croce
  const legs=M(new THREE.BoxGeometry(.55*S,2.4*S,.38*S,4,20,3),mC(0x555555));legs.position.y=-1.0*S;g.add(legs);
  // piedi
  const feet=M(new THREE.BoxGeometry(.7*S,.22*S,.5*S,5,2,4),mC(0x333333));feet.position.y=-2.25*S;g.add(feet);
  // braccia aperte — braccio orizzontale della croce
  [-1,1].forEach(sx=>{
    const arm=M(new THREE.CapsuleGeometry(.2*S,1.6*S,12,16),mW(0xdddddd));
    arm.position.set(sx*1.5*S,1.3*S,0);arm.rotation.z=sx*Math.PI/2;g.add(arm);
    // mano
    const hand=M(new THREE.SphereGeometry(.22*S,16,16),mW(0xeeeeee));
    hand.position.set(sx*2.4*S,1.3*S,0);g.add(hand);
    // dita
    for(let d=0;d<4;d++){
      const finger=M(new THREE.CapsuleGeometry(.05*S,.22*S,6,8),mW(0xcccccc));
      finger.position.set(sx*(2.55+d*.08)*S,1.3*S+(d-1.5)*.1*S,.05*S);finger.rotation.z=sx*Math.PI/2;g.add(finger);
    }
  });
  // testa dettagli
  const hair=M(new THREE.SphereGeometry(.38*S,20,20),mR());hair.scale.set(1.05,.4,1.05);hair.position.set(0,3.08*S,-.04*S);g.add(hair);
  [-1,1].forEach(sx=>{
    const eye=M(new THREE.SphereGeometry(.07*S,12,12),mR());eye.position.set(sx*.18*S,2.85*S,.38*S);g.add(eye);
  });
  // aureola / corona
  const halo=M(new THREE.TorusGeometry(.55*S,.04*S,12,64),mM(0xffffff));halo.position.y=3.05*S;g.add(halo);
  return g;
}

// pool di 6 varianti
const CROSSES=[
  buildCrossGreek(),
  buildCrossLatin(),
  buildCrossGothic(),
  buildCrossFragment(),
  buildCrossEnergy(),
  buildCrossHuman(),
];

// salva orig per deformazione (solo su quelli non _nodeform)
CROSSES.forEach(obj=>{
  obj.traverse(c=>{
    if(c.isMesh&&c.geometry.attributes.position){
      c._orig=new Float32Array(c.geometry.attributes.position.array);
    }
  });
});

// DEFORMAZIONE — stile noise_pak
function deform(obj,t,intensity=1){
  obj.traverse(c=>{
    if(!c.isMesh||!c._orig) return;
    const pos=c.geometry.attributes.position,orig=c._orig;
    for(let i=0;i<pos.count;i++){
      const ox=orig[i*3],oy=orig[i*3+1],oz=orig[i*3+2];
      const len=Math.sqrt(ox*ox+oy*oy+oz*oz)||.001;
      const nx=ox/len,ny=oy/len,nz=oz/len;
      const w=Math.sin(nx*12+t*2.2)*.022+Math.cos(ny*9+t*1.8)*.018+Math.sin(nz*10+t*2.5)*.014;
      const pulse=1+Math.sin(t*1.1)*.04;
      const dx=nx*w*len*8*intensity*pulse;
      const dy=ny*w*len*8*intensity*pulse;
      const dz=nz*w*len*8*intensity*pulse;
      pos.setXYZ(i,ox+dx,oy+dy,oz+dz);
    }
    pos.needsUpdate=true;c.geometry.computeVertexNormals();
  });
}

let current=CROSSES[0];
scene.add(current);
let crossIdx=0;
let tt=0,sigTimer=0;
const CROSS_DUR=5.0; // secondi per variante

function switchCross(idx){
  scene.remove(current);
  current=CROSSES[idx%CROSSES.length];
  scene.add(current);
  current.position.set(0,0,0);
  current.rotation.set(0,0,0);
}

// REC
let mediaRecorder=null,chunks=[];
const btnRec=document.getElementById('btnRec');
const btnStop=document.getElementById('btnStop');
const recStatus=document.getElementById('recStatus');
let recTimer=null;
btnRec.addEventListener('click',()=>{
  const stream=renderer.domElement.captureStream(60);chunks=[];
  mediaRecorder=new MediaRecorder(stream,{mimeType:'video/webm;codecs=vp9',videoBitsPerSecond:60000000});
  mediaRecorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
  mediaRecorder.onstop=()=>{
    const blob=new Blob(chunks,{type:'video/webm'});const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;
    a.download='noise_cross_'+new Date().toISOString().slice(0,10)+'.webm';
    a.click();URL.revokeObjectURL(url);
    recStatus.textContent='';btnRec.style.opacity='1';btnRec.style.pointerEvents='all';btnStop.classList.remove('active');
  };
  mediaRecorder.start(100);btnRec.style.opacity='.3';btnRec.style.pointerEvents='none';btnStop.classList.add('active');
  tt=0;sigTimer=0;crossIdx=0;switchCross(0);
  let sec=30;recStatus.textContent=`● ${sec}s`;
  recTimer=setInterval(()=>{sec--;recStatus.textContent=`● ${sec}s`;if(sec<=0){clearInterval(recTimer);mediaRecorder.stop();}},1000);
});
btnStop.addEventListener('click',()=>{if(mediaRecorder&&mediaRecorder.state!=='inactive'){clearInterval(recTimer);mediaRecorder.stop();}});

function animate(){
  requestAnimationFrame(animate);
  tt+=.016;sigTimer+=.016;

  if(sigTimer>=CROSS_DUR){
    sigTimer=0;
    crossIdx=(crossIdx+1)%CROSSES.length;
    switchCross(crossIdx);
  }

  // intensità deform cresce verso la fine del ciclo — poi si azzera al cambio
  const morphProgress=sigTimer/CROSS_DUR;
  const intensity=0.4+Math.sin(morphProgress*Math.PI)*.8;
  deform(current,tt,intensity);

  // volo — identico noise_pak
  current.rotation.x=Math.sin(tt*.25)*.8-.3;
  current.rotation.y=tt*.4+Math.sin(tt*.18)*.6;
  current.rotation.z=Math.sin(tt*.2)*.4;
  current.position.x=Math.sin(tt*.3)*1.8;
  current.position.y=Math.cos(tt*.22)*1.2+Math.sin(tt*.4)*.6;
  current.position.z=Math.sin(tt*.15)*1.2;

  camera.position.x=Math.sin(tt*.06)*18*.2;
  camera.position.y=Math.sin(tt*.04)*2;
  camera.position.z=18+Math.cos(tt*.06)*2;
  camera.lookAt(0,0,0);

  key.intensity=3000+Math.sin(tt*2)*500;
  rim.intensity=1500+Math.sin(tt*1.5)*300;
  renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
