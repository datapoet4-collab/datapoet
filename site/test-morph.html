<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<title>ATELIER AI — MORPH</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Courier New',monospace}
canvas{display:block;position:fixed;inset:0}
#hud{position:fixed;top:16px;left:20px;z-index:10;pointer-events:none}
#hud .title{font-size:13px;font-weight:700;letter-spacing:3px;color:#fff;text-transform:uppercase}
#hud .sub{font-size:8px;letter-spacing:3px;color:rgba(255,255,255,0.35);margin-top:3px;text-transform:uppercase}
#progress{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.2);transition:all .5s}
.dot.on{background:#fff;transform:scale(1.4)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="title" id="htitle">BLOB · CRIMSON</div>
  <div class="sub" id="hsub">WAR</div>
</div>
<div id="progress" id="dots"></div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

const STEPS=[
  {shape:'BLOB',    pal:{name:'CRIMSON',sig:'WAR',bg:0x8a0000,fog:0x5a0000,sphere:new THREE.Color(0.80,0.04,0.04),sphereE:new THREE.Color(0.55,0.0,0.0),c1:0xff2d2d,lA:0xff1111,lB:0x440000}},
  {shape:'SPHERE',  pal:{name:'GOLD',sig:'ECONOMY',bg:0x7fff00,fog:0x55cc00,sphere:new THREE.Color(0.855,0.647,0.125),sphereE:new THREE.Color(0.6,0.45,0.08),c1:0xdaa520,lA:0xdaa520,lB:0x446600}},
  {shape:'CUBE',    pal:{name:'NEON',sig:'TECH',bg:0x020810,fog:0x041020,sphere:new THREE.Color(0.02,0.28,0.20),sphereE:new THREE.Color(0.0,0.18,0.12),c1:0x00ffcc,lA:0x00ffaa,lB:0x002266}},
  {shape:'OCTA',    pal:{name:'VIOLET',sig:'POLITICS',bg:0x060010,fog:0x0a001a,sphere:new THREE.Color(0.22,0.04,0.48),sphereE:new THREE.Color(0.14,0.0,0.35),c1:0xcc00ff,lA:0xbb00ff,lB:0xff0088}},
  {shape:'TORUS',   pal:{name:'YELLOW',sig:'CRISIS',bg:0x1a1500,fog:0x0a0a00,sphere:new THREE.Color(0.70,0.60,0.0),sphereE:new THREE.Color(0.50,0.40,0.0),c1:0xffee00,lA:0xffdd00,lB:0x886600}},
  {shape:'ICOSA',   pal:{name:'GRAY',sig:'HUMAN',bg:0xff8c00,fog:0xcc6600,sphere:new THREE.Color(0.38,0.38,0.38),sphereE:new THREE.Color(0.22,0.22,0.22),c1:0x999999,lA:0xaaaaaa,lB:0x444444}},
];

const STEP_DURATION=5000; // ms per step
const FADE_DURATION=800;  // ms fade

function makeCore(shape,r){
  if(shape==='BLOB'){const g=new THREE.SphereGeometry(r,64,48);const p=g.attributes.position;for(let i=0;i<p.count;i++){const x=p.getX(i),y=p.getY(i),z=p.getZ(i);const n=Math.sin(x*4+y*3.2)*Math.cos(y*3.6+z*4)*.18;p.setXYZ(i,x+n*.3,y+n*.4,z+n*.2);}g.computeVertexNormals();return g;}
  if(shape==='SPHERE') return new THREE.SphereGeometry(r,48,36);
  if(shape==='CUBE')   return new THREE.BoxGeometry(r*1.7,r*1.7,r*1.7);
  if(shape==='OCTA')   return new THREE.OctahedronGeometry(r*1.18,2);
  if(shape==='TORUS')  return new THREE.TorusGeometry(r*0.9,r*0.38,32,64);
  if(shape==='ICOSA')  return new THREE.IcosahedronGeometry(r*1.1,2);
}
function makeBlob(shape,r){
  if(shape==='CUBE')  return new THREE.BoxGeometry(r,r,r);
  if(shape==='OCTA')  return new THREE.OctahedronGeometry(r,0);
  if(shape==='ICOSA') return new THREE.IcosahedronGeometry(r,0);
  return new THREE.SphereGeometry(r,12,8);
}
function blobDist(shape){return shape==='SPHERE'?1.5:shape==='CUBE'?1.3:1.0;}

const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;

const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.01,200);
camera.position.set(0,0,10);camera.lookAt(0,0,0);

// Dots
const dotsEl=document.getElementById('progress');
STEPS.forEach((_,i)=>{
  const d=document.createElement('div');
  d.className='dot'+(i===0?' on':'');
  d.id='dot'+i;
  dotsEl.appendChild(d);
});

let scene,L1,L2,group,blobData=[];
let currentStep=0;
let stepStart=Date.now();
let fading=false;
let fadeStart=0;
let t=0;

function buildStep(idx){
  const S=STEPS[idx];
  const P=S.pal;

  if(scene){
    scene.traverse(o=>{if(o.geometry)o.geometry.dispose();if(o.material)o.material.dispose();});
  }

  scene=new THREE.Scene();
  scene.background=new THREE.Color(P.bg);
  scene.fog=new THREE.FogExp2(P.fog,0.022);

  L1=new THREE.SpotLight(P.lA,700,50,.28,.2);L1.position.set(5,7,10);L1.castShadow=true;scene.add(L1);
  L2=new THREE.SpotLight(P.lB,400,40,.4,.3);L2.position.set(-6,-4,7);scene.add(L2);
  scene.add(new THREE.AmbientLight(0x111111));

  const matC=new THREE.MeshStandardMaterial({color:P.sphere,roughness:0.12,metalness:0.05,emissive:P.sphereE,emissiveIntensity:0.5,transparent:true,opacity:1});
  const matB=new THREE.MeshStandardMaterial({color:P.sphere,roughness:0.10,metalness:0.04,emissive:P.sphereE,emissiveIntensity:0.4,transparent:true,opacity:1});

  group=new THREE.Group();scene.add(group);
  group.add(new THREE.Mesh(makeCore(S.shape,2.2),matC));

  blobData=[];
  const N=160;
  const bd=blobDist(S.shape);
  for(let i=0;i<N;i++){
    const phi=Math.acos(1-2*(i+0.5)/N);
    const theta=Math.PI*(1+Math.sqrt(5))*i;
    const nx=Math.sin(phi)*Math.cos(theta),ny=Math.cos(phi),nz=Math.sin(phi)*Math.sin(theta);
    const r=0.03+Math.pow(Math.random(),1.8)*0.38;
    const dist=2.2+r*bd;
    const m=new THREE.Mesh(makeBlob(S.shape,r),matB);
    m.position.set(nx*dist,ny*dist,nz*dist);
    if(S.shape==='CUBE'||S.shape==='OCTA'||S.shape==='ICOSA')
      m.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,Math.random()*Math.PI);
    group.add(m);
    blobData.push({m,nx,ny,nz,dist,ph:i*0.07,sp:0.3+Math.random()*1.2,amp:0.012+Math.random()*0.03});
  }

  document.getElementById('htitle').textContent=S.shape+' · '+P.name;
  document.getElementById('hsub').textContent=P.sig;
  STEPS.forEach((_,i)=>document.getElementById('dot'+i).classList.toggle('on',i===idx));

  // Fade in
  scene.traverse(o=>{if(o.material&&o.material.opacity!==undefined)o.material.opacity=0;});
}

buildStep(0);

function getAllMats(){
  const mats=[];
  if(!scene)return mats;
  scene.traverse(o=>{if(o.material&&o.material.opacity!==undefined)mats.push(o.material);});
  return mats;
}

function animate(){
  requestAnimationFrame(animate);
  t+=0.012;
  const now=Date.now();

  // Fade in all'inizio
  const timeSinceStep=now-stepStart;
  if(timeSinceStep<FADE_DURATION){
    const op=timeSinceStep/FADE_DURATION;
    getAllMats().forEach(m=>m.opacity=Math.min(op,1));
  } else {
    getAllMats().forEach(m=>m.opacity=1);
  }

  // Fade out prima del cambio
  if(timeSinceStep>STEP_DURATION-FADE_DURATION && timeSinceStep<STEP_DURATION){
    const op=1-(timeSinceStep-(STEP_DURATION-FADE_DURATION))/FADE_DURATION;
    getAllMats().forEach(m=>m.opacity=Math.max(op,0));
  }

  // Cambio step
  if(timeSinceStep>=STEP_DURATION){
    currentStep=(currentStep+1)%STEPS.length;
    stepStart=now;
    buildStep(currentStep);
  }

  if(group){
    group.rotation.y+=0.005;
    group.rotation.x=Math.sin(t*0.04)*0.04;
    blobData.forEach(b=>{
      const pulse=Math.sin(t*b.sp+b.ph)*b.amp;
      b.m.position.set(b.nx*(b.dist+pulse),b.ny*(b.dist+pulse),b.nz*(b.dist+pulse));
      const S=STEPS[currentStep];
      if(S.shape==='CUBE'||S.shape==='OCTA'||S.shape==='ICOSA'){b.m.rotation.y+=0.007;b.m.rotation.x+=0.004;}
    });
  }

  if(L1){L1.intensity=550+Math.sin(t*0.9)*80;}
  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
</script>

<div style="position:fixed;top:16px;right:16px;z-index:200">
  <button id="recBtn" onclick="startRec()" style="font-family:'Courier New',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;padding:8px 18px;border:0.5px solid rgba(255,255,255,0.4);background:rgba(0,0,0,0.8);color:#fff;cursor:pointer">⏺ REC 35s</button>
</div>
<script>
function startRec(){
  const btn=document.getElementById('recBtn');
  btn.textContent='⏺ recording...';
  btn.style.color='#ff4444';
  const cv=document.getElementById('c');
  const stream=cv.captureStream(30);
  const rec=new MediaRecorder(stream,{mimeType:'video/webm;codecs=vp9',videoBitsPerSecond:80000000});
  const chunks=[];
  rec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
  rec.onstop=()=>{
    const blob=new Blob(chunks,{type:'video/webm'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='atelier-morph-'+new Date().toISOString().split('T')[0]+'.webm';
    a.click();
    btn.textContent='✅ scaricato!';
    btn.style.color='#00ff88';
  };
  rec.start();
  setTimeout(()=>rec.stop(),35000);
}
</script>
</body>
</html>
