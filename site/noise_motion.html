<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
const W=1440,H=900;
cv.width=W;cv.height=H;

const NEWS=[
'IRAN CEASEFIRE','250+ KILLED BEIRUT','HORMUZ BLOCKED','OIL $100 BARREL',
'TRUMP LOW-KEY','NATO THREAT','VANCE PAKISTAN','S&P 500 +7',
'AL JAZEERA KILLED','PRESS UNDER FIRE','RUSSIA BANS HISTORY','ARTEMIS FIREBALL',
'EARTHQUAKE 4.9','ZELENSKYY DAMASCUS','BRAZIL GAMBLING BAN','WORLD BANK -0.3%',
'CHINA BROKERED PEACE','182 DEAD LEBANON','HEZBOLLAH ROCKETS','IRAN WORLD POWER',
'CEASEFIRE SHAKY','PROPUBLICA STRIKE','RFK PODCAST','GULF STATES UPGRADE',
'25TH AMENDMENT','DEMOCRATS PUSH','LULA BANS GAMBLING','UNESCO BIJAGOS',
'BEIRUT MOURNS','HISTORY CRIMINALIZED',
];

const PAL=[
  [255,20,5],[255,80,0],[255,200,0],[0,255,80],[0,180,255],
  [180,0,255],[255,0,180],[0,255,220],[255,140,0],[80,255,0],
  [255,0,80],[0,120,255],[220,255,0],[255,60,120],[0,255,160],
  [255,255,0],[0,255,255],[255,0,255],[180,255,0],[0,180,180],
];

let tt=0;
const layers=[];

function rnd(n){return Math.floor(Math.random()*n);}
function rndNews(){return NEWS[rnd(NEWS.length)];}
function rndCol(){return PAL[rnd(PAL.length)];}
function lerpC(a,b,t){return a.map((v,i)=>v+(b[i]-v)*t);}
function rgb(c,a){return`rgba(${Math.round(c[0])},${Math.round(c[1])},${Math.round(c[2])},${a??1})`;}

// Scroll orizzontale
for(let i=0;i<10;i++){
  layers.push({
    type:'scroll-h',
    y:50+i*(H/10.5),
    news:rndNews(),nextNews:rndNews(),
    col:rndCol(),nextCol:rndCol(),
    x:Math.random()*W,
    speed:(i%2===0?1:-1)*(2+i*.6),
    size:28+i*9,
    morphT:Math.random(),
    morphSpeed:0.08+Math.random()*.12,
  });
}

// Orbite
const centers=[
  {x:W*.12,y:H*.35},{x:W*.5,y:H*.5},{x:W*.88,y:H*.35},
  {x:W*.28,y:H*.78},{x:W*.72,y:H*.78},{x:W*.5,y:H*.15},
  {x:W*.2,y:H*.6},{x:W*.8,y:H*.6},
];
centers.forEach((c,i)=>{
  layers.push({
    type:'orbit',
    cx:c.x,cy:c.y,
    r:55+i*32,
    news:rndNews(),nextNews:rndNews(),
    col:rndCol(),nextCol:rndCol(),
    angle:Math.random()*Math.PI*2,
    speed:(i%2===0?.9:-.7)*(1+i*.08),
    size:16+i*4,
    morphT:Math.random(),
    morphSpeed:0.06+Math.random()*.1,
  });
});

// Scroll verticale
for(let i=0;i<8;i++){
  layers.push({
    type:'scroll-v',
    x:60+i*(W/8.2),
    news:rndNews(),nextNews:rndNews(),
    col:rndCol(),nextCol:rndCol(),
    y:Math.random()*H,
    speed:(i%2===0?1.8:-1.5)*(1+i*.15),
    size:13+i*3,
    morphT:Math.random(),
    morphSpeed:0.07+Math.random()*.1,
  });
}

// Esplosioni dal centro
for(let i=0;i<30;i++){
  const ang=i/30*Math.PI*2;
  layers.push({
    type:'explode',
    cx:W/2,cy:H/2,
    ang:ang,
    r:Math.random()*Math.max(W,H)*.9,
    maxR:Math.max(W,H)*.95,
    news:rndNews(),
    col:rndCol(),nextCol:rndCol(),
    speed:1.8+Math.random()*2,
    size:11+rnd(4)*4,
    phase:Math.random()*Math.PI*2,
  });
}

function drawLayer(l){
  const mt=l.morphT||0;
  const c=lerpC(l.col,l.nextCol,mt);
  const glitch=mt>.38&&mt<.62&&Math.random()>.6;
  const txt=glitch?'▓▒░█▓▒':mt<.5?l.news:l.nextNews;
  const alpha=glitch?.95:.6+Math.sin(tt*.4+(l.cx||l.x||0)*.003)*.3;

  ctx.font=`bold ${l.size}px 'Courier New',monospace`;
  ctx.fillStyle=rgb(c,alpha);

  if(l.type==='scroll-h'){
    l.x+=l.speed;
    const tw=txt.length*l.size*.62+80;
    if(l.speed>0&&l.x>W+tw) l.x=-tw;
    if(l.speed<0&&l.x<-tw*2) l.x=W+tw;
    let x=l.x;
    while(x<W+tw*2){ctx.fillText(txt,x,l.y);x+=tw;}
    x=l.x-tw;
    while(x>-tw*3){ctx.fillText(txt,x,l.y);x-=tw;}
  }
  else if(l.type==='scroll-v'){
    l.y+=l.speed;
    const th=txt.length*l.size*.62+50;
    if(l.speed>0&&l.y>H+th*2) l.y=-th*2;
    if(l.speed<0&&l.y<-th*3) l.y=H+th*2;
    ctx.save();ctx.translate(l.x,l.y);ctx.rotate(-Math.PI/2);
    let y=0;
    while(y<H+th*3){ctx.fillText(txt,y,0);y+=th;}
    y=-th;
    while(y>-H-th*2){ctx.fillText(txt,y,0);y-=th;}
    ctx.restore();
  }
  else if(l.type==='orbit'){
    l.angle+=l.speed*0.016;
    const str=mt<.5?l.news:l.nextNews;
    const nChars=Math.max(1,Math.floor(2*Math.PI*l.r/(l.size*.65)));
    for(let i=0;i<nChars;i++){
      const ang=l.angle+i/nChars*Math.PI*2;
      const char=glitch?'█':str[i%str.length];
      ctx.save();
      ctx.translate(l.cx+Math.cos(ang)*l.r,l.cy+Math.sin(ang)*l.r);
      ctx.rotate(ang+Math.PI/2);
      ctx.fillText(char,-l.size*.3,l.size*.35);
      ctx.restore();
    }
  }
  else if(l.type==='explode'){
    l.r+=l.speed;
    if(l.r>l.maxR){
      l.r=0;
      l.col=l.nextCol;
      l.nextCol=rndCol();
      l.news=rndNews();
    }
    const wobble=Math.sin(tt*2+l.phase)*25;
    const x=l.cx+Math.cos(l.ang)*(l.r+wobble);
    const y=l.cy+Math.sin(l.ang)*(l.r+wobble)*.75;
    const a=Math.max(0,(1-l.r/l.maxR)*alpha);
    ctx.fillStyle=rgb(c,a);
    ctx.save();ctx.translate(x,y);ctx.rotate(l.ang);
    const char=l.news[Math.floor(l.r*.05)%l.news.length]||'·';
    ctx.fillText(char,-l.size*.3,l.size*.35);
    ctx.restore();
    return; // explode non ha morphT
  }

  // morph infinito
  l.morphT=(l.morphT||0)+l.morphSpeed*0.016;
  if(l.morphT>=1){
    l.morphT=0;
    l.news=l.nextNews;
    l.col=l.nextCol;
    l.nextNews=rndNews();
    l.nextCol=rndCol();
  }
}

// sfondo denso
const bgL=[];
for(let i=0;i<600;i++){
  bgL.push({
    x:Math.random()*W,y:Math.random()*H,
    char:rndNews()[rnd(20)]||'·',
    col:rndCol(),
    size:6+Math.random()*10,
    alpha:0.015+Math.random()*0.035,
    vx:(Math.random()-.5)*.2,
    vy:(Math.random()-.5)*.15,
  });
}

function loop(){
  requestAnimationFrame(loop);
  tt+=0.016;

  ctx.fillStyle='rgba(0,0,0,0.16)';
  ctx.fillRect(0,0,W,H);

  bgL.forEach(b=>{
    b.x+=b.vx;b.y+=b.vy;
    if(b.x<0)b.x=W;if(b.x>W)b.x=0;
    if(b.y<0)b.y=H;if(b.y>H)b.y=0;
    ctx.font=`${b.size}px Courier New`;
    ctx.fillStyle=`rgba(${b.col[0]},${b.col[1]},${b.col[2]},${b.alpha})`;
    ctx.fillText(b.char,b.x,b.y);
  });

  layers.forEach(l=>drawLayer(l));

  ctx.save();ctx.globalAlpha=.04;ctx.fillStyle='#000';
  for(let y=0;y<H;y+=2)ctx.fillRect(0,y,W,1);
  ctx.restore();
}
loop();
</script>
</body>
</html>
