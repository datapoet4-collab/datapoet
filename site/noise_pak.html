// MATERIALI — solo bianco nero grigio, texture pesante
function makeTex(type){
  const s=512;const d=new Uint8Array(s*s*4);
  for(let i=0;i<s*s;i++){
    const x=i%s,y=Math.floor(i/s);
    let v=128;
    if(type==='concrete'){
      v=80+Math.random()*110;
      if(Math.sin(x*.06)*Math.cos(y*.09)>.82) v=Math.max(20,v-70);
      if(Math.random()>.96) v=Math.max(10,v-90);
    } else if(type==='metal'){
      v=110+Math.sin(y*.9+x*.015)*65+Math.random()*25;
      if(Math.random()>.98) v=Math.min(255,v+90);
    } else if(type==='rubber'){
      v=22+Math.random()*35;
      if(Math.random()>.88) v+=18;
    } else if(type==='marble'){
      const vn=Math.sin(x*.05+Math.sin(y*.08)*3)*Math.cos(y*.04)*128+128;
      v=Math.round(vn*.4+90+Math.random()*30);
    }
    d[i*4]=v;d[i*4+1]=v;d[i*4+2]=v;d[i*4+3]=255;
  }
  const t=new THREE.DataTexture(d,s,s,THREE.RGBAFormat);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(3,3);t.needsUpdate=true;
  return t;
}

// Salva posizioni originali per deformazione
function saveOrig(obj){
  obj.traverse(c=>{
    if(c.isMesh&&c.geometry.attributes.position){
      c._orig=new Float32Array(c.geometry.attributes.position.array);
    }
  });
}

// DEFORMAZIONE VERTICI — identica a noise_fly ma più intensa
function deform(obj,sig,t){
  obj.traverse(c=>{
    if(!c.isMesh||!c._orig) return;
    const pos=c.geometry.attributes.position;
    const orig=c._orig;
    const cat=sig.cat;
    for(let i=0;i<pos.count;i++){
      const ox=orig[i*3],oy=orig[i*3+1],oz=orig[i*3+2];
      const len=Math.sqrt(ox*ox+oy*oy+oz*oz)||.001;
      const nx=ox/len,ny=oy/len,nz=oz/len;
      let dx=0,dy=0,dz=0;
      if(cat==='WAR'){
        const w=Math.sin(nx*18+t*3.5)*.035+Math.abs(Math.sin(ny*22+t*4))*.028;
        const drip=Math.max(0,Math.sin(t*.9+ox*4))*.04;
        dx=nx*w*len*9;dy=ny*w*len*9-drip;dz=nz*w*len*9;
      } else if(cat==='POL'){
        const w=Math.sin(nx*11+t*2.2)*(nx>0?.04:.01)+Math.cos(ny*13+t*2.5)*.02;
        dx=nx*w*len*8;dy=ny*w*len*8;dz=nz*w*len*8;
      } else if(cat==='TECH'){
        const w=Math.round(Math.sin(nx*20+t*5)*6)/6*.022;
        dx=nx*w*len*8;dy=ny*w*len*8;dz=nz*w*len*8;
      } else if(cat==='CRISIS'){
        const w=Math.sin(nx*5+t*.95)*.016;
        const melt=Math.max(0,Math.sin(t*.55+ox*2.5))*.038;
        dx=nx*w*len*7;dy=ny*w*len*7-melt;dz=nz*w*len*7;
      } else if(cat==='ECO'){
        const b=1+Math.sin(t*2)*.07;
        dx=ox*(b-1);dy=oy*(b-1);dz=oz*(b-1);
      } else if(cat==='CUL'){
        const w=Math.sin(nx*7+t*1.4)*.014+Math.cos(ny*9+t*1.7)*.012;
        dx=nx*w*len*8;dy=ny*w*len*8;dz=nz*w*len*8;
      } else {
        const w=Math.sin(nx*6+t*1.2)*.012+Math.cos(ny*8+t*1.5)*.01;
        dx=nx*w*len*8;dy=ny*w*len*8;dz=nz*w*len*8;
      }
      pos.setXYZ(i,ox+dx,oy+dy,oz+dz);
    }
    pos.needsUpdate=true;
    c.geometry.computeVertexNormals();
  });
}

function applyMat(sig,obj){
  // materiale unico per notizia — bianco/nero/grigio
  const palette=[
    {c:0xffffff,r:.88,m:.03}, // bianco marmo
    {c:0x111111,r:.99,m:.0},  // nero gomma
    {c:0xaaaaaa,r:.08,m:.99}, // cromo
    {c:0x666666,r:.95,m:.05}, // cemento
    {c:0xdddddd,r:.85,m:.04}, // bianco cemento
    {c:0x333333,r:.92,m:.08}, // antracite
    {c:0x888888,r:.12,m:.98}, // acciaio
  ];
  const p=palette[sig.idx%palette.length];
  const mat=new THREE.MeshStandardMaterial({
    color:p.c,roughness:p.r,metalness:p.m,
    map:p.m>.5?TX.m:p.r>.9?TX.r:TX.c,
    roughnessMap:p.m>.5?TX.m:p.r>.9?TX.r:TX.c,
    bumpMap:p.m>.5?TX.m:p.r>.9?TX.r:TX.c,
    bumpScale:.06,
  });
  obj.traverse(c=>{if(c.isMesh) c.material=mat;});
}

  saveOrig(obj);
  applyMat(sig,obj);
  return obj;
});

let current=null;
let sigIdx=0,sigTimer=0,tt=0,totalTimer=0;
const TOTAL=30.;
const SIG_DUR=TOTAL/SIGNALS.length;

function switchTo(idx){
  if(current) scene.remove(current);
  current=POOL[idx];
  scene.add(current);
  // reset posizione
  current.position.set(0,0,0);
  current.rotation.set(0,0,0);
  const sig=SIGNALS[idx];
  document.getElementById('sig').innerHTML=`NOISE — 10/04/2026<br>${sig.t}<br>${idx+1} / ${SIGNALS.length}`;
  document.getElementById('hl').innerHTML=sig.hl.replace(/\n/g,'<br>');
}

switchTo(0);

function animate(){
  requestAnimationFrame(animate);
  tt+=.016;sigTimer+=.016;totalTimer+=.016;

  if(totalTimer>=TOTAL){totalTimer=0;sigIdx=0;sigTimer=0;switchTo(0);}
  if(sigTimer>=SIG_DUR){sigTimer=0;sigIdx=(sigIdx+1)%SIGNALS.length;switchTo(sigIdx);}

  const sig=SIGNALS[sigIdx];

  // DEFORMAZIONE — cuore dell'effetto
  if(current) deform(current,sig,tt);

  // VOLO — identico noise_fly.html
  if(current){
    current.rotation.x=Math.sin(tt*.25)*.8-.3;
    current.rotation.y=tt*.4+Math.sin(tt*.18)*.6;
    current.rotation.z=Math.sin(tt*.2)*.4;
    current.position.x=Math.sin(tt*.3)*2.5;
    current.position.y=Math.cos(tt*.22)*1.5+Math.sin(tt*.4)*.8;
    current.position.z=Math.sin(tt*.15)*1.5;
  }

  document.getElementById('fill').style.width=(sigTimer/SIG_DUR*100)+'%';

  // camera identica noise_fly
  camera.position.x=Math.sin(tt*.06)*18*.2;
  camera.position.y=Math.sin(tt*.04)*2;
  camera.position.z=18+Math.cos(tt*.06)*2;
  camera.lookAt(0,0,0);

  key.intensity=3000+Math.sin(tt*2)*500;
  rim.intensity=1500+Math.sin(tt*1.5)*300;

  renderer.render(scene,camera);
}
animate();
</script>
</body>
