function makeTex(type){
  const s=512;const d=new Uint8Array(s*s*4);
  for(let i=0;i<s*s;i++){
    const x=i%s,y=Math.floor(i/s);let v=128;
    if(type==='concrete'){v=80+Math.random()*110;if(Math.sin(x*.06)*Math.cos(y*.09)>.82)v=Math.max(20,v-70);if(Math.random()>.96)v=Math.max(10,v-90);}
    else if(type==='metal'){v=110+Math.sin(y*.9+x*.015)*65+Math.random()*25;if(Math.random()>.98)v=Math.min(255,v+90);}
    else if(type==='rubber'){v=22+Math.random()*35;if(Math.random()>.88)v+=18;}
    else if(type==='marble'){const vn=Math.sin(x*.05+Math.sin(y*.08)*3)*Math.cos(y*.04)*128+128;v=Math.round(vn*.4+90+Math.random()*30);}
    d[i*4]=v;d[i*4+1]=v;d[i*4+2]=v;d[i*4+3]=255;
  }
  const t=new THREE.DataTexture(d,s,s,THREE.RGBAFormat);
  t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(3,3);t.needsUpdate=true;return t;
}
const TX={c:makeTex('concrete'),m:makeTex('metal'),r:makeTex('rubber'),w:makeTex('marble')};
const mC=(col=0x555555)=>new THREE.MeshStandardMaterial({color:col,roughness:.97,metalness:.02,map:TX.c,roughnessMap:TX.c,bumpMap:TX.c,bumpScale:.08});

const mW=(col=0xdddddd)=>new THREE.MeshStandardMaterial({color:col,roughness:.88,metalness:.03,map:TX.w,roughnessMap:TX.w,bumpMap:TX.w,bumpScale:.05});

const PALETTE=[
  {c:0xffffff,r:.88,m:.03},{c:0x111111,r:.99,m:.0},{c:0xaaaaaa,r:.08,m:.99},

function palMat(idx){
  const p=PALETTE[idx%PALETTE.length];

}

const G=()=>new THREE.Group();
const M=(geo,mat)=>{const o=new THREE.Mesh(geo,mat);o.castShadow=true;o.receiveShadow=true;return o;};
const S=1.8;

function buildMissile(){

function buildFigure(){

// salva vertici originali per deformazione
function saveOrig(obj){
  obj.traverse(c=>{
    if(c.isMesh&&c.geometry.attributes.position){
      c._orig=new Float32Array(c.geometry.attributes.position.array);
    }
  });
}

function deform(obj,sig,t){
  obj.traverse(c=>{
    if(!c.isMesh||!c._orig) return;
    const pos=c.geometry.attributes.position;
    const orig=c._orig;
    const cat=sig.cat;
    for(let i=0;i<pos.count;i++){
      const ox=orig[i*3],oy=orig[i*3+1],oz=orig[i*3+2];
      const len=Math.sqrt(ox*ox+oy*oy+oz*oz)||.001;
      const nx=ox/len,ny=oy/len,nz=oz/len;
      let dx=0,dy=0,dz=0;
      if(cat==='WAR'){const w=Math.sin(nx*18+t*3.5)*.035+Math.abs(Math.sin(ny*22+t*4))*.028;const drip=Math.max(0,Math.sin(t*.9+ox*4))*.04;dx=nx*w*len*9;dy=ny*w*len*9-drip;dz=nz*w*len*9;}
      else if(cat==='POL'){const w=Math.sin(nx*11+t*2.2)*(nx>0?.04:.01)+Math.cos(ny*13+t*2.5)*.02;dx=nx*w*len*8;dy=ny*w*len*8;dz=nz*w*len*8;}
      else if(cat==='TECH'){const w=Math.round(Math.sin(nx*20+t*5)*6)/6*.022;dx=nx*w*len*8;dy=ny*w*len*8;dz=nz*w*len*8;}
      else if(cat==='CRISIS'){const w=Math.sin(nx*5+t*.95)*.016;const melt=Math.max(0,Math.sin(t*.55+ox*2.5))*.038;dx=nx*w*len*7;dy=ny*w*len*7-melt;dz=nz*w*len*7;}
      else if(cat==='ECO'){const b=1+Math.sin(t*2)*.07;dx=ox*(b-1);dy=oy*(b-1);dz=oz*(b-1);}
      else{const w=Math.sin(nx*7+t*1.4)*.014+Math.cos(ny*9+t*1.7)*.012;dx=nx*w*len*8;dy=ny*w*len*8;dz=nz*w*len*8;}
      pos.setXYZ(i,ox+dx,oy+dy,oz+dz);
    }
    pos.needsUpdate=true;
    c.geometry.computeVertexNormals();
  });
}

const BUILDERS=[buildMissile,buildBust,buildBarrel,buildCamera,buildRocket,buildFigure,buildPlane,buildRuins];

// Pre-costruisce tutti gli oggetti e salva i vertici originali
const POOL=BUILDERS.map(fn=>{
  const obj=fn();
  saveOrig(obj);
  return obj;
});

// MORPH — fade opacity + swap pulito
// Usiamo due oggetti in scena contemporaneamente durante il morph
// A (current) scala da 1→0, B (next) scala da 0→1
let objA=null,objB=null;
let morphT=1;
const MORPH_DUR=3.0; // durata transizione
let sigIdxA=0,sigIdxB=0;

const pivot=new THREE.Group();
scene.add(pivot);

function setOpacity(obj,op){
  obj.traverse(c=>{
    if(c.isMesh){
      c.material=c.material.clone();
      c.material.transparent=true;
      c.material.opacity=op;
    }
  });
}

function startMorph(fromIdx,toIdx){
  // rimuovi vecchio B se esiste
  if(objB){pivot.remove(objB);objB=null;}
  // A diventa quello che era B o il corrente
  if(objA) pivot.remove(objA);
  objA=POOL[fromIdx%8];
  setOpacity(objA,1);
  pivot.add(objA);

  objB=POOL[toIdx%8];
  // reset vertici B ai valori originali
  objB.traverse(c=>{
    if(c.isMesh&&c._orig){
      const pos=c.geometry.attributes.position;
      for(let i=0;i<pos.count;i++) pos.setXYZ(i,c._orig[i*3],c._orig[i*3+1],c._orig[i*3+2]);
      pos.needsUpdate=true;c.geometry.computeVertexNormals();
    }
  });
  setOpacity(objB,0);
  pivot.add(objB);
  sigIdxA=fromIdx;sigIdxB=toIdx;
  morphT=0;
}

function stepMorph(dt){
  if(morphT>=1) return;
  morphT=Math.min(1,morphT+dt/MORPH_DUR);
  const e=morphT<.5?2*morphT*morphT:1-Math.pow(-2*morphT+2,2)/2;
  if(objA) setOpacity(objA,1-e);
  if(objB) setOpacity(objB,e);
  if(morphT>=1&&objA){
    pivot.remove(objA);objA=null;
  }
}

const TOTAL=60., SIG_DUR=TOTAL/SIGNALS.length; // 3s per notizia
let sigIdx=0,sigTimer=0,tt=0,totalTimer=0,lastT=performance.now();

function switchTo(fromIdx,toIdx){
  const sig=SIGNALS[toIdx];
  startMorph(fromIdx,toIdx);
  document.getElementById('sig').innerHTML=`NOISE — 10/04/2026 · ${sig.t} · ${sig.tension}`;
  document.getElementById('hl').innerHTML=sig.hl.replace(/\n/g,'<br>');
}

// avvio — primo oggetto senza morph
objA=POOL[0];
saveOrig(objA);
setOpacity(objA,1);
pivot.add(objA);
sigIdxA=0;sigIdxB=0;morphT=1;
const s0=SIGNALS[0];
document.getElementById('sig').innerHTML=`NOISE — 10/04/2026 · ${s0.t} · ${s0.tension}`;
document.getElementById('hl').innerHTML=s0.hl.replace(/\n/g,'<br>');

// REC
let mediaRecorder=null,chunks=[];
const btnRec=document.getElementById('btnRec');
const btnStop=document.getElementById('btnStop');
const recStatus=document.getElementById('recStatus');
let recTimer=null;
btnRec.addEventListener('click',()=>{
  const stream=renderer.domElement.captureStream(60);
  chunks=[];
  mediaRecorder=new MediaRecorder(stream,{mimeType:'video/webm;codecs=vp9',videoBitsPerSecond:40000000});
  mediaRecorder.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
  mediaRecorder.onstop=()=>{
    const blob=new Blob(chunks,{type:'video/webm'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;
    a.download='noise_final_'+new Date().toISOString().slice(0,19).replace(/:/g,'-')+'.webm';
    a.click();URL.revokeObjectURL(url);
    recStatus.textContent='';btnRec.style.opacity='1';btnRec.style.pointerEvents='all';btnStop.classList.remove('active');
  };
  mediaRecorder.start(100);
  btnRec.style.opacity='.3';btnRec.style.pointerEvents='none';btnStop.classList.add('active');
  tt=0;sigTimer=0;totalTimer=0;sigIdx=0;
  if(objB){pivot.remove(objB);objB=null;}
  if(objA){pivot.remove(objA);}
  objA=POOL[0];setOpacity(objA,1);pivot.add(objA);morphT=1;
  const s=SIGNALS[0];
  document.getElementById('sig').innerHTML=`NOISE — 10/04/2026 · ${s.t} · ${s.tension}`;
  document.getElementById('hl').innerHTML=s.hl.replace(/\n/g,'<br>');
  let sec=60;recStatus.textContent=`● ${sec}s`;
  recTimer=setInterval(()=>{sec--;recStatus.textContent=`● ${sec}s`;if(sec<=0){clearInterval(recTimer);mediaRecorder.stop();}},1000);
});
btnStop.addEventListener('click',()=>{if(mediaRecorder&&mediaRecorder.state!=='inactive'){clearInterval(recTimer);mediaRecorder.stop();}});

function animate(){
  requestAnimationFrame(animate);
  const now=performance.now();
  const dt=Math.min((now-lastT)/1000,.05);lastT=now;
  tt+=dt;sigTimer+=dt;totalTimer+=dt;

  if(totalTimer>=TOTAL){
    totalTimer=0;
    const prev=sigIdx;
    sigIdx=0;sigTimer=0;
    switchTo(prev,0);
  }
  if(sigTimer>=SIG_DUR){
    const prev=sigIdx;
    sigTimer=0;sigIdx=(sigIdx+1)%SIGNALS.length;
    switchTo(prev,sigIdx);
  }

  const sig=SIGNALS[sigIdx];
  stepMorph(dt);

  // deforma entrambi gli oggetti attivi
  if(objA) deform(objA,SIGNALS[sigIdxA],tt);
  if(objB) deform(objB,sig,tt);

  // volo pivot — identico noise_pak
  pivot.rotation.x=Math.sin(tt*.25)*.8-.3;
  pivot.rotation.y=tt*.4+Math.sin(tt*.18)*.6;
  pivot.rotation.z=Math.sin(tt*.2)*.4;
  pivot.position.x=Math.sin(tt*.3)*2.5;
  pivot.position.y=Math.cos(tt*.22)*1.5+Math.sin(tt*.4)*.8;
  pivot.position.z=Math.sin(tt*.15)*1.5;

  document.getElementById('fill').style.width=(sigTimer/SIG_DUR*100)+'%';

  camera.position.x=Math.sin(tt*.06)*18*.2;
  camera.position.y=Math.sin(tt*.04)*2;
  camera.position.z=18+Math.cos(tt*.06)*2;
  camera.lookAt(0,0,0);
  key.intensity=3000+Math.sin(tt*2)*500;
  rim.intensity=1500+Math.sin(tt*1.5)*300;
  renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
