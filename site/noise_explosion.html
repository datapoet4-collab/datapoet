<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<style>
*{margin:0;padding:0}
body{overflow:hidden;width:100vw;height:100vh;font-family:'Courier New',monospace}
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}
#sig{position:absolute;top:16px;left:16px;font-size:8px;letter-spacing:3px;line-height:2.2;color:#fff;mix-blend-mode:overlay}
#hl{position:absolute;bottom:55px;left:16px;right:16px;font-size:11px;letter-spacing:3px;line-height:1.9;text-transform:uppercase;font-weight:bold;color:#fff;mix-blend-mode:overlay}
#bar{position:absolute;bottom:28px;left:16px;right:16px;height:1px;background:rgba(255,255,255,.15)}
#fill{height:1px;background:#fff}
#wm{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:6px;letter-spacing:4px;color:rgba(255,255,255,.4);white-space:nowrap}
</style>
</head>
<body>
<div id="hud">
  <div id="sig"></div>
  <div id="hl"></div>
  <div id="bar"><div id="fill"></div></div>
  <div id="wm">DATA POET · NOISE · 10/04/2026</div>
</div>
<script type="module">
import * as THREE from 'three';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';

const W=window.innerWidth,H=window.innerHeight;
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(W,H);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.8;
renderer.shadowMap.enabled=true;
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(60,W/H,0.01,1000);
camera.position.set(0,0,22);

// SFONDO GRADIENTE — come l'immagine
const bgScene=new THREE.Scene();
const bgCam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
const bgGeo=new THREE.PlaneGeometry(2,2);
const bgMat=new THREE.ShaderMaterial({
  uniforms:{
    c1:{value:new THREE.Color(0xff6b6b)},
    c2:{value:new THREE.Color(0x6b4aff)},
    c3:{value:new THREE.Color(0xff9ef0)},
    t:{value:0},
  },
  vertexShader:`varying vec2 vUv;void main(){vUv=uv;gl_Position=vec4(position,1.);}`,
  fragmentShader:`
    uniform vec3 c1,c2,c3;uniform float t;varying vec2 vUv;
    void main(){
      vec3 a=mix(c1,c2,vUv.x+sin(t*.3)*.1);
      vec3 b=mix(a,c3,vUv.y*.7+cos(t*.25)*.1);
      gl_FragColor=vec4(b,1.);
    }`,
  depthWrite:false,
});
bgScene.add(new THREE.Mesh(bgGeo,bgMat));

// LUCI
scene.add(new THREE.AmbientLight(0xffffff,2));
const key=new THREE.DirectionalLight(0xffffff,8);
key.position.set(5,8,6);key.castShadow=true;scene.add(key);
const fill=new THREE.DirectionalLight(0xffffff,4);fill.position.set(-6,2,4);scene.add(fill);
const rim=new THREE.DirectionalLight(0xffffff,5);rim.position.set(0,5,-8);scene.add(rim);
const bot=new THREE.PointLight(0xffffff,3,50);bot.position.set(0,-8,3);scene.add(bot);

const SIGNALS=[
  {t:'IRAN WAR · 95%',bg1:0xff2200,bg2:0x330088,bg3:0xff6644,hl:'CEASEFIRE HOLDS\nISRAEL STRIKES 250+\nBEIRUT MOURNS',model:'war',ec:[1,.05,.0],tc:[.8,.3,.0]},
  {t:'TRUMP · 88%',bg1:0xffaa00,bg2:0x553300,bg3:0xffdd88,hl:'LOW-KEY THEY SAID\nBOMBS STILL FALL\nHORMUZ BLOCKED',model:'politics',ec:[.9,.6,.0],tc:[1.,.8,.1]},
  {t:'250+ DEAD · 82%',bg1:0xaa0066,bg2:0x220044,bg3:0xff44aa,hl:'BLACK WEDNESDAY\n182 IN ONE DAY\nNATIONAL MOURNING',model:'human',ec:[.7,.0,.4],tc:[1.,.2,.6]},
  {t:'OIL $100 · 75%',bg1:0xff8800,bg2:0x442200,bg3:0xffcc44,hl:'HORMUZ STANDSTILL\n20% WORLD OIL\nGLOBAL CRISIS',model:'war',ec:[.8,.4,.0],tc:[1.,.6,.0]},
  {t:'ARTEMIS · FIREBALL',bg1:0x0044ff,bg2:0x001166,bg3:0x44ccff,hl:'REENTRY BEGINS\nFIREBALL DESCENT\nCREW RETURNS',model:'tech',ec:[.0,.4,1.],tc:[.2,.8,1.]},
  {t:'NATO · TRUMP · 72%',bg1:0x6600ff,bg2:0x220066,bg3:0xcc88ff,hl:'PAY OR WE LEAVE\nALLIANCE SHAKES\nEUROPE PANICS',model:'politics',ec:[.4,.0,.9],tc:[.7,.3,1.]},
  {t:'PRESS KILLED · 85%',bg1:0xff3300,bg2:0x440000,bg3:0xff8866,hl:'AL JAZEERA DOWN\nGAZA CITY STRIKE\nPRESS UNDER FIRE',model:'human',ec:[.9,.1,.0],tc:[1.,.4,.1]},
  {t:'EARTHQUAKE 4.9',bg1:0xaa6600,bg2:0x331100,bg3:0xffaa44,hl:'EAST INDONESIA\n100 HOUSES GONE\nGROUND SHAKES',model:'war',ec:[.6,.3,.0],tc:[.9,.5,.1]},
  {t:'ZELENSKYY DAMASCUS',bg1:0x0088ff,bg2:0x002255,bg3:0x88ccff,hl:'FIRST VISIT SYRIA\nSECURITY TIES\nNEW ALLIANCE',model:'tech',ec:[.0,.5,1.],tc:[.1,.7,.9]},
  {t:'S&P +7 SESSIONS',bg1:0x00aa44,bg2:0x002211,bg3:0x88ffaa,hl:'MARKETS RISE\nWHILE WAR BURNS\nLONGEST SINCE OCT',model:'culture',ec:[.0,.7,.3],tc:[.2,1.,.5]},
];

const loader=new GLTFLoader();
const modelCache={};
const modelNames=['war','politics','human','tech','culture'];
let loadedCount=0;

// Oggetti in scena
const objects=[];
let sigIdx=0,sigTimer=0,tt=0;
const SIG_DUR=5.0;
let running=false;

// Precarica tutti i modelli
modelNames.forEach(name=>{
  loader.load(`/models/${name}.glb`,gltf=>{
    modelCache[name]=gltf.scene;
    loadedCount++;
    if(loadedCount===modelNames.length){
      running=true;
      spawnSignal(SIGNALS[0]);
      animate();
    }
  },null,e=>{ loadedCount++; console.warn(name,e); if(loadedCount===modelNames.length){running=true;animate();} });
});

function makeMaterial(ec,tc,roughness=0.4,metalness=0.6){
  return new THREE.MeshStandardMaterial({
    color:new THREE.Color(...ec).multiplyScalar(0.7),
    emissive:new THREE.Color(...ec),
    emissiveIntensity:0.3,
    roughness,metalness,
  });
}

function spawnObject(sig,i,total){
  const src=modelCache[sig.model];
  if(!src) return;
  const obj=src.clone(true);

  // scala random
  const sc=0.3+Math.random()*1.8;
  obj.scale.setScalar(sc);

  // box normalization
  const box=new THREE.Box3().setFromObject(obj);
  const center=new THREE.Vector3();box.getCenter(center);
  obj.position.sub(center.multiplyScalar(sc));

  // materiale random tra ec e tc
  const mix=Math.random();
  const ec=sig.ec.map((v,j)=>v+(sig.tc[j]-v)*mix);
  const roughness=0.1+Math.random()*.8;
  const metalness=Math.random()>.5?0.8+Math.random()*.2:0.1+Math.random()*.3;
  const mat=makeMaterial(ec,sig.tc,roughness,metalness);
  obj.traverse(child=>{if(child.isMesh)child.material=mat;});

  // posizione esplosione — dal centro verso fuori
  const ang=Math.random()*Math.PI*2;
  const elevation=(Math.random()-.5)*Math.PI;
  const dist=0.5+Math.random()*3;
  const vx=Math.cos(ang)*Math.cos(elevation)*dist;
  const vy=Math.sin(elevation)*dist;
  const vz=Math.sin(ang)*Math.cos(elevation)*dist;

  obj.userData={
    vx,vy,vz:vz*.5,
    rx:(Math.random()-.5)*3,
    ry:(Math.random()-.5)*3,
    rz:(Math.random()-.5)*2,
    born:tt,
    life:SIG_DUR*(0.7+Math.random()*.5),
    sc,
    drag:0.92+Math.random()*.06,
  };

  scene.add(obj);
  objects.push(obj);
}

function clearObjects(){
  objects.forEach(o=>scene.remove(o));
  objects.length=0;
}

function spawnSignal(sig){
  clearObjects();
  // aggiorna sfondo
  bgMat.uniforms.c1.value.setHex(sig.bg1);
  bgMat.uniforms.c2.value.setHex(sig.bg2);
  bgMat.uniforms.c3.value.setHex(sig.bg3);

  // luci colorate
  key.color.setRGB(...sig.ec);
  fill.color.setRGB(...sig.tc);
  rim.color.lerpColors(new THREE.Color(...sig.ec),new THREE.Color(1,1,1),.5);

  // spawna 30-50 oggetti
  const n=30+Math.floor(Math.random()*20);
  for(let i=0;i<n;i++) setTimeout(()=>spawnObject(sig,i,n),i*60);
}

function updateHUD(sig,mt){
  document.getElementById('sig').innerHTML=`NOISE — 10/04/2026<br>${sig.t}<br>TENSION: CRITICAL`;
  document.getElementById('hl').innerHTML=sig.hl.replace(/\n/g,'<br>');
  document.getElementById('fill').style.width=mt*100+'%';
}

function animate(){
  requestAnimationFrame(animate);
  tt+=0.016;sigTimer+=0.016;
  bgMat.uniforms.t.value=tt;

  if(sigTimer>=SIG_DUR){
    sigTimer=0;
    sigIdx=(sigIdx+1)%SIGNALS.length;
    spawnSignal(SIGNALS[sigIdx]);
  }

  const mt=sigTimer/SIG_DUR;
  updateHUD(SIGNALS[sigIdx],mt);

  // aggiorna oggetti — fisica esplosione
  objects.forEach(o=>{
    const u=o.userData;
    u.vx*=u.drag;u.vy*=u.drag;u.vz*=u.drag;
    o.position.x+=u.vx*.16;
    o.position.y+=u.vy*.16;
    o.position.z+=u.vz*.12;
    o.rotation.x+=u.rx*.016;
    o.rotation.y+=u.ry*.016;
    o.rotation.z+=u.rz*.016;
    // gravità leggera
    u.vy-=0.015;
  });

  // camera orbita lenta
  camera.position.x=Math.sin(tt*.06)*4;
  camera.position.y=Math.sin(tt*.04)*2+1;
  camera.position.z=22+Math.cos(tt*.05)*3;
  camera.lookAt(0,0,0);

  renderer.autoClear=false;
  renderer.clear();
  renderer.render(bgScene,bgCam);
  renderer.render(scene,camera);
}
</script>
</body>
</html>
