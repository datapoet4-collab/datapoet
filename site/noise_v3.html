<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Courier New',monospace}
canvas{display:block}
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}
#info{position:absolute;top:20px;left:20px;font-size:9px;line-height:2.2;letter-spacing:2px}
#cur{position:absolute;bottom:60px;left:20px;font-size:11px;letter-spacing:3px;font-weight:bold}
#bar{position:absolute;bottom:40px;left:20px;right:20px;height:1px;background:rgba(255,255,255,0.1)}
#fill{height:1px;width:0%}
#wm{position:absolute;bottom:16px;right:16px;font-size:8px;letter-spacing:2px;color:rgba(255,255,255,0.15)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="info"></div>
  <div id="cur"></div>
  <div id="bar"><div id="fill"></div></div>
  <div id="wm">DATA POET · NOISE #001 · 04/07/2026</div>
</div>
<script>
const W=450,H=800;
const c=document.getElementById('c');
c.width=W;c.height=H;
const gl=c.getContext('webgl');
const VS=`attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}`;
const FS=`
precision highp float;
uniform vec2 res;
uniform float time;
uniform vec3 col1;
uniform vec3 col2;
uniform vec3 bgCol;
uniform float objType; // 0=missile 1=busto 2=razzo 3=microfono 4=figura 5=astronauta
uniform float intensity;
uniform float morphT;

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){vec2 i=floor(p);vec2 f=fract(p);f=f*f*(3.-2.*f);return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}
float fbm(vec2 p){float v=0.;float a=.5;for(int i=0;i<5;i++){v+=a*noise(p);p*=2.1;a*=.5;}return v;}
float smin(float a,float b,float k){float h=clamp(.5+.5*(b-a)/k,0.,1.);return mix(b,a,h)-k*h*(1.-h);}
float smax(float a,float b,float k){return -smin(-a,-b,k);}
float sdBox(vec3 p,vec3 b){vec3 d=abs(p)-b;return length(max(d,0.))+min(max(d.x,max(d.y,d.z)),0.);}
float sdCyl(vec3 p,float r,float h){vec2 d=abs(vec2(length(p.xz),p.y))-vec2(r,h);return min(max(d.x,d.y),0.)+length(max(d,0.));}
float sdSph(vec3 p,float r){return length(p)-r;}
float sdCap(vec3 p,vec3 a,vec3 b,float r){vec3 pa=p-a,ba=b-a;float h=clamp(dot(pa,ba)/dot(ba,ba),0.,1.);return length(pa-ba*h)-r;}
float sdCone(vec3 p,float r,float h){vec2 q=vec2(length(p.xz),p.y);vec2 tip=vec2(0,h);vec2 base=vec2(r,0);vec2 d=q-mix(tip,base,clamp(dot(q-tip,base-tip)/dot(base-tip,base-tip),0.,1.));return length(d)*sign(max(dot(q,vec2(h,-r)),p.y));}
float sdTorus(vec3 p,float R,float r){return length(vec2(length(p.xz)-R,p.y))-r;}

// MISSILE / ARMA
float missile(vec3 p, float t, float ity){
  // inclina il missile
  float ang=0.3+sin(t*0.3)*0.1;
  vec3 q=vec3(p.x*cos(ang)+p.y*sin(ang),-p.x*sin(ang)+p.y*cos(ang),p.z);
  // corpo principale
  float body=sdCyl(q,0.12,0.8);
  // ogiva
  float tip=sdCone(q-vec3(0.,0.8,0.),0.12,0.35);
  // alette
  float fin1=sdBox(q-vec3(0.,-0.5,0.),vec3(0.28,0.15,0.02));
  float fin2=sdBox(q-vec3(0.,-0.5,0.),vec3(0.02,0.15,0.28));
  // propulsore
  float nozzle=sdCyl(q-vec3(0.,-0.85,0.),0.09,0.08);
  // deformazione war
  float deform=sin(q.y*18.+t*3.)*0.008*ity+sin(q.x*22.+t*3.8)*0.006*ity;
  float d=body+deform;
  d=smin(d,tip+deform,0.05);
  d=smin(d,fin1,0.02);
  d=smin(d,fin2,0.02);
  d=smin(d,nozzle,0.03);
  return d;
}

// BUSTO UMANO (Trump/Politics)
float bust(vec3 p, float t, float ity){
  // testa
  float head=sdSph(p-vec3(0.,0.6,0.),0.38);
  // collo
  float neck=sdCyl(p-vec3(0.,0.15,0.),0.14,0.18);
  // spalle/busto
  float shoulder=sdBox(p-vec3(0.,-0.2,0.),vec3(0.58,0.22,0.32));
  float shoulderR=sdSph(p-vec3(0.6,-0.1,0.),0.28);
  float shoulderL=sdSph(p-vec3(-0.6,-0.1,0.),0.28);
  // deformazione politics — asimmetrica
  float side=sign(p.x);
  float deform=sin(p.y*8.+t*2.)*0.03*ity*side+cos(p.x*6.+t*2.5)*0.02*ity;
  float d=head+deform;
  d=smin(d,neck,0.08);
  d=smin(d,shoulder,0.12);
  d=smin(d,shoulderR,0.08);
  d=smin(d,shoulderL,0.08);
  return d;
}

// RAZZO SPAZIALE (Artemis)
float rocket(vec3 p, float t, float ity){
  // corpo principale
  float body=sdCyl(p,0.22,1.1);
  // ogiva
  float tip=sdCone(p-vec3(0.,1.1,0.),0.22,0.5);
  // serbatoio laterale sx
  float tankL=sdCyl(p-vec3(-0.35,0.,0.),0.1,0.9);
  float tankR=sdCyl(p-vec3(0.35,0.,0.),0.1,0.9);
  // ugelli
  float noz1=sdCyl(p-vec3(0.,-1.15,0.),0.14,0.1);
  float noz2=sdCyl(p-vec3(-0.28,-1.15,0.),0.07,0.08);
  float noz3=sdCyl(p-vec3(0.28,-1.15,0.),0.07,0.08);
  // dettagli
  float ring1=sdTorus(p-vec3(0.,0.3,0.),0.22,0.025);
  float ring2=sdTorus(p-vec3(0.,-0.3,0.),0.22,0.025);
  // deformazione tech — glitch
  float deform=floor(sin(p.y*20.+t*4.)*4.)/4.*0.008*ity;
  float d=body+deform;
  d=smin(d,tip+deform,0.06);
  d=smin(d,tankL,0.04);
  d=smin(d,tankR,0.04);
  d=smin(d,noz1,0.04);
  d=smin(d,noz2,0.03);
  d=smin(d,noz3,0.03);
  d=min(d,ring1);
  d=min(d,ring2);
  return d;
}

// MICROFONO + CORONA (Kanye/Culture)
float microphone(vec3 p, float t, float ity){
  // testa microfono
  float head=sdSph(p-vec3(0.,0.6,0.),0.28);
  // griglia
  float grid=sdSph(p-vec3(0.,0.6,0.),0.26);
  // asta
  float stem=sdCyl(p-vec3(0.,0.,0.),0.055,0.55);
  // base
  float base=sdTorus(p-vec3(0.,-0.6,0.),0.25,0.055);
  // corona sopra
  float crown1=sdBox(p-vec3(0.,1.0,0.),vec3(0.06,0.18,0.06));
  float crown2=sdBox(p-vec3(-0.2,0.95,0.),vec3(0.05,0.14,0.05));
  float crown3=sdBox(p-vec3(0.2,0.95,0.),vec3(0.05,0.14,0.05));
  float crownB=sdBox(p-vec3(0.,0.82,0.),vec3(0.35,0.06,0.06));
  // pulse
  float pulse=sin(t*3.)*0.5+0.5;
  float deform=sin(length(p)*8.-t*4.)*0.02*ity*pulse;
  float d=head+deform;
  d=max(d,-(grid-0.02));
  d=smin(d,stem,0.05);
  d=smin(d,base,0.04);
  d=smin(d,crown1,0.03);
  d=smin(d,crown2,0.03);
  d=smin(d,crown3,0.03);
  d=smin(d,crownB,0.03);
  return d;
}

// FIGURA CHE SI DISSOLVE (Deaths)
float figure(vec3 p, float t, float ity){
  float melt=t*0.08;
  // testa
  float head=sdSph(p-vec3(0.,0.8,0.),0.22);
  // corpo
  float torso=sdBox(p-vec3(0.,0.2,0.),vec3(0.2,0.35,0.15));
  // braccia
  float armL=sdCap(p,vec3(-0.25,0.4,0.),vec3(-0.45,0.,0.),0.07);
  float armR=sdCap(p,vec3(0.25,0.4,0.),vec3(0.45,0.,0.),0.07);
  // gambe
  float legL=sdCap(p,vec3(-0.1,-0.15,0.),vec3(-0.15,-0.85,0.),0.09);
  float legR=sdCap(p,vec3(0.1,-0.15,0.),vec3(0.15,-0.85,0.),0.09);
  // drip — effetto scioglimento
  float drip=max(0.,sin(t*0.5+p.x*3.))*0.06*ity;
  float organic=sin(p.x*4.+t)*0.02*ity+cos(p.y*5.+t*0.8)*0.018*ity;
  float d=head+organic;
  d=smin(d,torso+organic,0.1);
  d=smin(d,armL,0.06);
  d=smin(d,armR,0.06);
  d=smin(d,legL,0.08);
  d=smin(d,legR,0.08);
  d-=drip;
  return d;
}

// ASTRONAUTA (Koch)
float astronaut(vec3 p, float t, float ity){
  // casco
  float helmet=sdSph(p-vec3(0.,0.7,0.),0.32);
  float visor=sdSph(p-vec3(0.,0.68,0.15),0.24);
  // tuta corpo
  float torso=sdBox(p-vec3(0.,0.1,0.),vec3(0.3,0.38,0.24));
  float torsoR=sdSph(p-vec3(0.,0.15,0.),0.32);
  // zaino
  float pack=sdBox(p-vec3(0.,0.1,-0.28),vec3(0.22,0.3,0.08));
  // braccia
  float armL=sdCyl(p-vec3(-0.42,0.15,0.),0.1,0.32);
  float armR=sdCyl(p-vec3(0.42,0.15,0.),0.1,0.32);
  // guanti
  float glovL=sdSph(p-vec3(-0.42,-0.2,0.),0.12);
  float glovR=sdSph(p-vec3(0.42,-0.2,0.),0.12);
  // flottante — respira lentamente
  float breathe=sin(t*0.8)*0.01*ity;
  float d=helmet+breathe;
  d=max(d,-(visor-0.02));
  d=smin(d,torso,0.1);
  d=smin(smax(d,torsoR-0.01,0.05),torsoR,0.05);
  d=smin(d,pack,0.05);
  d=smin(d,armL,0.06);
  d=smin(d,armR,0.06);
  d=smin(d,glovL,0.04);
  d=smin(d,glovR,0.04);
  return d;
}

float getObj(vec3 p, float sig, float t, float ity){
  int s=int(sig+0.5);
  if(s==0) return missile(p,t,ity);
  if(s==1) return bust(p,t,ity);
  if(s==2) return rocket(p,t,ity);
  if(s==3) return microphone(p,t,ity);
  if(s==4) return figure(p,t,ity);
  return astronaut(p,t,ity);
}

vec2 scene(vec3 p, float sig, float t, float ity){
  float dO=getObj(p,sig,t,ity);
  float dF=p.y+1.1;
  if(dO<dF) return vec2(dO,1.);
  return vec2(dF,2.);
}
vec3 nrm(vec3 p,float sig,float t,float ity){
  vec2 e=vec2(.001,0.);
  return normalize(vec3(
    scene(p+e.xyy,sig,t,ity).x-scene(p-e.xyy,sig,t,ity).x,
    scene(p+e.yxy,sig,t,ity).x-scene(p-e.yxy,sig,t,ity).x,
    scene(p+e.yyx,sig,t,ity).x-scene(p-e.yyx,sig,t,ity).x));
}
float shd(vec3 ro,vec3 rd,float sig,float t,float ity){
  float r=1.;float tt=0.02;
  for(int i=0;i<24;i++){float h=scene(ro+rd*tt,sig,t,ity).x;if(h<.001)return 0.;r=min(r,8.*h/tt);tt+=h;if(tt>4.)break;}
  return r;
}
float occ(vec3 p,vec3 n,float sig,float t,float ity){
  float o=0.;float s=1.;
  for(int i=0;i<5;i++){float h=.01+.12*float(i)/4.;o+=(h-scene(p+h*n,sig,t,ity).x)*s;s*=.95;}
  return clamp(1.-3.*o,0.,1.);
}

void main(){
  vec2 uv=(gl_FragCoord.xy/res-.5)*vec2(1.,res.y/res.x)*2.;
  vec3 curCol=mix(col1,col2,morphT);
  vec3 bg=bgCol;

  // camera
  vec3 ro=vec3(sin(time*0.12)*0.5,0.3+sin(time*0.08)*0.1,3.2);
  vec3 ta=vec3(0.,0.,0.);
  vec3 ww=normalize(ta-ro);
  vec3 uu=normalize(cross(ww,vec3(0,1,0)));
  vec3 vv=cross(uu,ww);
  vec3 rd=normalize(uv.x*uu+uv.y*vv+1.7*ww);

  // cielo atmosferico
  vec3 sunDir=normalize(vec3(1.2,0.7,-0.6));
  vec3 sunCol=mix(curCol*1.5+vec3(.3),vec3(1.,.9,.7),.35);
  float sk=max(0.,rd.y);
  vec3 sky=mix(bg,mix(bg,vec3(.1,.15,.3),.4),pow(sk,.5));
  sky+=sunCol*pow(max(0.,dot(rd,sunDir)),20.)*.5;
  vec3 finalCol=sky;

  float t2=0.;vec2 hit=vec2(0.);bool found=false;
  for(int i=0;i<100;i++){
    vec3 p=ro+rd*t2;
    hit=scene(p,objType,time,intensity);
    if(hit.x<.001){found=true;break;}
    if(t2>10.) break;
    t2+=hit.x*.88;
  }

  if(found){
    vec3 p=ro+rd*t2;
    vec3 n=nrm(p,objType,time,intensity);
    float sd=shd(p+n*.002,sunDir,objType,time,intensity);
    float ao=occ(p,n,objType,time,intensity);
    float diff=max(0.,dot(n,sunDir));
    float skyd=max(0.,dot(n,vec3(0,1,0)))*.4;
    vec3 hal=normalize(sunDir-rd);
    float spec=pow(max(0.,dot(n,hal)),80.);
    float fres=pow(1.-max(0.,dot(-rd,n)),4.);
    vec3 matCol;

    if(hit.y<1.5){
      float tex=fbm(vec2(atan(p.x,p.z)*4.,p.y*6.+time*.03));
      vec3 vc=mix(curCol*.5,curCol,tex);
      float curv=clamp(dot(n,normalize(vec3(p.x,0.,p.z)))*.5+.5,0.,1.);
      vc=mix(vc*.3,vc,curv);
      float vein=smoothstep(.35,.65,fbm(vec2(atan(p.x,p.z)*8.,p.y*10.)));
      vc=mix(vc,vc*.2,vein*.4);
      matCol=vc*(diff*sd*sunCol*2.2+skyd*vec3(.2,.3,.5)*ao+curCol*.06);
      matCol+=sunCol*spec*sd*.8;
      matCol+=vec3(.2,.3,.5)*fres*.18;
      matCol+=curCol*fres*.15;
    } else {
      float asp=fbm(p.xz*5.)*.5+.5;
      vec3 rc=mix(vec3(.08,.08,.09),vec3(.18,.17,.16),asp);
      float cr=smoothstep(.46,.5,fbm(p.xz*2.2));
      rc=mix(rc,vec3(.04,.04,.05),cr*.5);
      matCol=rc*(diff*sd*sunCol*1.2+skyd*vec3(.2,.3,.5)*ao+.03);
      float wet=exp(-length(p.xz)*2.)*.22;
      matCol+=curCol*wet;
      matCol+=sunCol*spec*sd*.15;
    }

    // alone colorato
    float rim=pow(1.-max(0.,dot(n,normalize(ro-p))),3.)*.4;
    matCol+=curCol*rim*.6;

    float fog=1.-exp(-t2*.04);
    finalCol=mix(matCol,sky,fog);
  }

  finalCol+=vec3((hash(gl_FragCoord.xy+time)-.5)*.02);
  float vig=1.-smoothstep(.5,1.5,length(uv*vec2(.8,1.)));
  finalCol*=vig;
  finalCol=finalCol*(2.51*finalCol+.03)/(finalCol*(2.43*finalCol+.59)+.14);
  finalCol=pow(clamp(finalCol,0.,1.),vec3(.4545));
  gl_FragColor=vec4(finalCol,1.);
}`;

function sh(t,s){const x=gl.createShader(t);gl.shaderSource(x,s);gl.compileShader(x);if(!gl.getShaderParameter(x,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(x));return x;}
const prog=gl.createProgram();
gl.attachShader(prog,sh(gl.VERTEX_SHADER,VS));
gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog);gl.useProgram(prog);
const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const pl=gl.getAttribLocation(prog,'p');
gl.enableVertexAttribArray(pl);gl.vertexAttribPointer(pl,2,gl.FLOAT,false,0,0);
const uR=gl.getUniformLocation(prog,'res'),uT=gl.getUniformLocation(prog,'time');
const uC1=gl.getUniformLocation(prog,'col1'),uC2=gl.getUniformLocation(prog,'col2');
const uBg=gl.getUniformLocation(prog,'bgCol'),uO=gl.getUniformLocation(prog,'objType');
const uI=gl.getUniformLocation(prog,'intensity'),uM=gl.getUniformLocation(prog,'morphT');
gl.uniform2f(uR,W,H);

const SIGNALS=[
  {t:'2026 Iran war',    c:'war',     obj:0, col:[.92,.04,.01], bg:[.06,.01,.01], v:.95},
  {t:'Trump Threats',    c:'war',     obj:0, col:[.85,.03,.01], bg:[.05,.01,.01], v:.88},
  {t:'F-35 Got Hit',     c:'war',     obj:0, col:[.78,.03,.01], bg:[.04,.01,.01], v:.82},
  {t:'Donald Trump',     c:'politics',obj:1, col:[.85,.65,.0],  bg:[.07,.05,.01], v:.85},
  {t:'Iran Negotiations',c:'politics',obj:1, col:[.5,.03,.9],   bg:[.04,.01,.07], v:.78},
  {t:'Tucker Carlson',   c:'politics',obj:1, col:[.42,.03,.78], bg:[.03,.01,.06], v:.65},
  {t:'Artemis II',       c:'tech',    obj:2, col:[.0,.7,1.],    bg:[.01,.03,.08], v:.70},
  {t:'MegaTrain LLMs',   c:'tech',    obj:2, col:[.0,.6,.95],   bg:[.01,.02,.07], v:.68},
  {t:'WrestleMania 42',  c:'culture', obj:3, col:[1.,.6,.0],    bg:[.07,.04,.01], v:.60},
  {t:'Kanye West',       c:'culture', obj:3, col:[.95,.5,.0],   bg:[.06,.04,.01], v:.65},
  {t:'Deaths in 2026',   c:'human',   obj:4, col:[.0,.8,.35],   bg:[.01,.05,.02], v:.75},
  {t:'Christina Koch',   c:'human',   obj:5, col:[.0,.7,.3],    bg:[.01,.04,.02], v:.68},
];

let idx=0,timer=0,t=0;
const DUR=4.0;

function hud(sig,next,mt){
  const r=Math.round,c=sig.col;
  const hex=`rgb(${r(c[0]*255)},${r(c[1]*255)},${r(c[2]*255)})`;
  document.getElementById('info').style.color=hex;
  document.getElementById('info').innerHTML=`NOISE — 04/07/2026<br>${sig.c.toUpperCase()} · ${r(sig.v*100)}% · CRITICAL`;
  document.getElementById('cur').style.color=hex;
  document.getElementById('cur').textContent='▶ '+sig.t;
  document.getElementById('fill').style.cssText=`background:${hex};width:${mt*100}%`;
}

(function frame(){
  requestAnimationFrame(frame);
  t+=0.016;timer+=0.016;
  if(timer>=DUR){timer=0;idx=(idx+1)%SIGNALS.length;}
  const mt=timer/DUR;
  const sig=SIGNALS[idx];
  const next=SIGNALS[(idx+1)%SIGNALS.length];
  hud(sig,next,mt);
  gl.uniform1f(uT,t);
  gl.uniform3fv(uC1,sig.col);
  gl.uniform3fv(uC2,next.col);
  gl.uniform3fv(uBg,sig.bg);
  gl.uniform1f(uO,sig.obj);
  gl.uniform1f(uI,sig.v);
  gl.uniform1f(uM,mt);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
})();
</script>
