<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"/><style>*{margin:0;padding:0}body{overflow:hidden;background:#000}</style></head>
<body>
<script type="module">
import * as THREE from '/three.module.js';
const W=window.innerWidth,H=window.innerHeight;
const renderer=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x000000,1);
renderer.shadowMap.enabled=true;
document.body.appendChild(renderer.domElement);
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(70,W/H,.01,200);
camera.position.set(0,0,9);
camera.lookAt(0,0,0);

const L1=new THREE.SpotLight(0xffffff,600,50,.28,.2);
L1.position.set(5,7,10);L1.castShadow=true;L1.shadow.mapSize.set(2048,2048);scene.add(L1);
const L2=new THREE.SpotLight(0xff0000,350,40,.4,.3);L2.position.set(-6,-4,7);scene.add(L2);
const L3=new THREE.PointLight(0xffffff,200,30);L3.position.set(0,6,-4);scene.add(L3);
const L4=new THREE.PointLight(0xff3300,150,25);L4.position.set(3,-5,4);scene.add(L4);
scene.add(new THREE.AmbientLight(0x080808));

function mR(c,r,m){return new THREE.MeshStandardMaterial({color:c,roughness:r||.85,metalness:m||.1});}
function mM(c,r){return new THREE.MeshStandardMaterial({color:c,roughness:r||.08,metalness:.96});}
function mG(c,ei){return new THREE.MeshStandardMaterial({color:c,emissive:c,emissiveIntensity:ei||.9,roughness:.02,metalness:.98});}

const world=new THREE.Group();
scene.add(world);

// MACCHINA BASE
const base=new THREE.Group();
world.add(base);
const bg=new THREE.SphereGeometry(2.5,64,48);
const bpos=bg.attributes.position;
for(let i=0;i<bpos.count;i++){
  const x=bpos.getX(i),y=bpos.getY(i),z=bpos.getZ(i);
  const n=Math.sin(x*4+y*3.2)*Math.cos(y*3.6+z*4)*.18;
  bpos.setXYZ(i,x+n*.3,y+n*.4,z+n*.2);
}
bg.computeVertexNormals();
const sphereMat=new THREE.MeshStandardMaterial({color:new THREE.Color(0,0.10,0.29),roughness:.92,metalness:.08,emissive:new THREE.Color(0,0,0.0004),emissiveIntensity:0.4});base.add(new THREE.Mesh(bg,sphereMat));

const crests=[];
for(let i=0;i<220;i++){
  const a=i/220*Math.PI*2;
  const px=Math.cos(a)*2.5*1.25,py=Math.sin(a*3)*.35+.3,pz=Math.sin(a)*2.5*.45;
  const norm=new THREE.Vector3(px,py*.5,pz).normalize();
  const h=.04+Math.pow(Math.abs(Math.sin(i/220*Math.PI*14)),.3)*(.6+Math.random()*.9);
  const isRed=Math.random()<.22;
  const geo=Math.random()<.55?new THREE.BoxGeometry(.007,h,.07+Math.random()*.13):new THREE.ConeGeometry(.009,h,4);
  const mat=isRed?mG(0xff0000):Math.random()<.12?mM(0xffffff,.04):mR(0x060000,.88,.06);
  const m=new THREE.Mesh(geo,mat);
  m.position.set(px,py,pz);m.position.addScaledVector(norm,h*.5);
  m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),norm);
  m.castShadow=true;base.add(m);
  crests.push({m,norm,bp:new THREE.Vector3(px,py,pz),h,ph:i*.07,sp:.5+Math.random()*2.5,amp:.8+Math.random()*3});
}

const frags=[];
for(let i=0;i<350;i++){
  const phi=Math.acos(1-2*Math.random()),theta=Math.random()*Math.PI*2;
  const r=2+Math.random()*.9;
  const isRed=Math.random()<.2;
  const geo=Math.random()<.4?new THREE.ConeGeometry(.004,Math.random()*.28+.01,4):
    new THREE.BoxGeometry(.005,Math.random()*.18+.01,.03+Math.random()*.08);
  const m=new THREE.Mesh(geo,isRed?mG(0xff0000):mR(0x050000,.78,.05));
  m.position.set(Math.sin(phi)*Math.cos(theta)*r,Math.cos(phi)*r,Math.sin(phi)*Math.sin(theta)*r*.7);
  m.rotation.set(Math.random()*6.28,Math.random()*6.28,Math.random()*6.28);
  base.add(m);
  const ox=m.position.x,oy=m.position.y,oz=m.position.z;
  frags.push({m,ox,oy,oz,
    rx:(Math.random()-.5)*.018,ry:(Math.random()-.5)*.025,rz:(Math.random()-.5)*.014,
    f1:.08+Math.random()*.25,f2:.06+Math.random()*.2,f3:.05+Math.random()*.18,
    a1:.005+Math.random()*.032,a2:.005+Math.random()*.025,a3:.003+Math.random()*.02,
    p1:Math.random()*6.28,p2:Math.random()*6.28,p3:Math.random()*6.28,hasEmit:isRed});
}

// NOMI — canvas texture con testo
function makeLabel(name,col){
  const cv=document.createElement('canvas');
  cv.width=256;cv.height=64;
  const ctx=cv.getContext('2d');
  ctx.clearRect(0,0,256,64);
  ctx.font='bold 32px monospace';
  ctx.fillStyle=col||'#ffffff';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText(name,128,32);
  return new THREE.CanvasTexture(cv);
}

// NOMI CHE ORBITANO — distribuiti sulla sfera a 360
const names=[
  {text:'TRUMP',col:'#ff2200'},
  {text:'PUTIN',col:'#4444ff'},
  {text:'ZELENSKY',col:'#00ff44'},
  {text:'MACRON',col:'#ffcc00'},
  {text:'ERDOGAN',col:'#ff8800'},
];

const nameObjs=[];
names.forEach((n,i)=>{
  const tex=makeLabel(n.text,n.col);
  const mat=new THREE.MeshBasicMaterial({map:tex,transparent:true,side:THREE.DoubleSide});
  const mesh=new THREE.Mesh(new THREE.PlaneGeometry(1.2,0.3),mat);
  world.add(mesh);
  // distribuzione sferica
  const phi=Math.acos(1-2*(i+.5)/names.length);
  const theta=2.399963*i;
  const r=2.85;
  nameObjs.push({
    m:mesh,
    phi,theta,r,
    orbitSpeed:.15+i*.04,
    phase:i*1.2,
    baseTheta:theta
  });
});

// MISSILI
const missiles=[];
for(let i=0;i<5;i++){
  const g=new THREE.Group();
  g.add(new THREE.Mesh(new THREE.CylinderGeometry(.055,.075,1.6,10),mM(0x888888,.08)));
  const tip=new THREE.Mesh(new THREE.ConeGeometry(.055,.4,10),mG(0xff0000,.8));
  tip.position.y=1.0;g.add(tip);
  for(let f=0;f<4;f++){
    const fin=new THREE.Mesh(new THREE.BoxGeometry(.16,.32,.01),mM(0x444444,.1));
    fin.position.set(.075,-.65,0);fin.rotation.y=f*1.5708;g.add(fin);
  }
  // fiamma
  const fl=new THREE.Mesh(new THREE.ConeGeometry(.04,.3,6),mG(0xff4400,.9));
  fl.position.y=-1.05;fl.rotation.x=Math.PI;g.add(fl);
  const a=i/5*Math.PI*2;
  g.position.set(Math.cos(a)*5.5,Math.sin(a)*2.8,0);
  g.rotation.z=-Math.PI*.25;g.rotation.y=a;
  world.add(g);
  missiles.push({m:g,angle:a,sp:.004+Math.random()*.003,ph:i*1.2});
}

// NAVE — Hormuz
const shipG=new THREE.Group();
shipG.add(new THREE.Mesh(new THREE.BoxGeometry(2.2,.22,.7),mM(0x334455,.12)));
const pr=new THREE.Mesh(new THREE.ConeGeometry(.35,.65,4),mM(0x334455,.12));
pr.position.set(1.4,0,0);pr.rotation.z=-Math.PI/2;shipG.add(pr);
const dk=new THREE.Mesh(new THREE.BoxGeometry(1.6,.1,.55),mM(0x445566,.15));
dk.position.y=.16;shipG.add(dk);
const tu=new THREE.Mesh(new THREE.CylinderGeometry(.16,.18,.22,8),mM(0x222233,.1));
tu.position.set(.2,.28,0);shipG.add(tu);
const gunship=new THREE.Mesh(new THREE.CylinderGeometry(.035,.035,.75,6),mM(0x111122,.08));
gunship.position.set(.65,.32,0);gunship.rotation.z=Math.PI/2;shipG.add(gunship);
// label nave
const shipLabel=makeLabel('HORMUZ','#4444ff');
const shipLabelMesh=new THREE.Mesh(new THREE.PlaneGeometry(2,.5),
  new THREE.MeshBasicMaterial({map:shipLabel,transparent:true,side:THREE.DoubleSide}));
shipLabelMesh.position.set(0,.6,0);
shipG.add(shipLabelMesh);
shipG.position.set(0,-4.5,.5);shipG.scale.setScalar(1.4);
world.add(shipG);

// DRONE
const droneG=new THREE.Group();
droneG.add(new THREE.Mesh(new THREE.BoxGeometry(.4,.08,.2),mM(0x333333,.12)));
[[-1,0],[1,0],[0,-1],[0,1]].forEach(([bx,bz])=>{
  const arm=new THREE.Mesh(new THREE.BoxGeometry(Math.abs(bx)>.5?.4:.04,.03,Math.abs(bz)>.5?.4:.04),mM(0x222222,.15));
  arm.position.set(bx*.22,0,bz*.22);droneG.add(arm);
  const rot=new THREE.Mesh(new THREE.CylinderGeometry(.14,.14,.015,8),mM(0x111111,.1));
  rot.position.set(bx*.22+bx*.14,0,bz*.22+bz*.14);rot.userData.isRotor=true;droneG.add(rot);
});
const droneLabelMesh=new THREE.Mesh(new THREE.PlaneGeometry(2,.5),
  new THREE.MeshBasicMaterial({map:makeLabel('DRONE','#00ffaa'),transparent:true,side:THREE.DoubleSide}));
droneLabelMesh.position.set(0,.3,0);droneG.add(droneLabelMesh);
droneG.position.set(0,4.5,1);droneG.scale.setScalar(2);
world.add(droneG);

let t=0;
function animate(){
  requestAnimationFrame(animate);
  t+=.016;

  // CRESTE
  crests.forEach(c=>{
    const sc=Math.max(.05,.2+Math.abs(Math.sin(t*c.sp+c.ph))*c.amp);
    c.m.scale.y=sc;
    c.m.position.copy(c.bp).addScaledVector(c.norm,c.h*sc*.5);
    if(c.m.material.emissiveIntensity>0) c.m.material.emissiveIntensity=.7+Math.sin(t*3+c.ph)*.3;
  });

  // FRAMMENTI
  frags.forEach(o=>{
    o.m.rotation.x+=o.rx;o.m.rotation.y+=o.ry;o.m.rotation.z+=o.rz;
    o.m.position.x=o.ox+Math.sin(t*o.f1+o.p1)*o.a1;
    o.m.position.y=o.oy+Math.cos(t*o.f2+o.p2)*o.a2;
    o.m.position.z=o.oz+Math.sin(t*o.f3+o.p3)*o.a3;
    if(o.hasEmit&&o.m.material.emissiveIntensity!==undefined)
      o.m.material.emissiveIntensity=.6+Math.sin(t*2.5+o.p1)*.35;
  });

  // NOMI — orbitano sulla sfera a 360
  nameObjs.forEach((n,i)=>{
    const theta=n.baseTheta+t*n.orbitSpeed;
    const phi=n.phi+Math.sin(t*.2+n.phase)*.3;
    n.m.position.x=Math.sin(phi)*Math.cos(theta)*n.r;
    n.m.position.y=Math.cos(phi)*n.r;
    n.m.position.z=Math.sin(phi)*Math.sin(theta)*n.r;
    // guarda sempre verso la camera
    n.m.lookAt(camera.position);
  });

  // MISSILI
  missiles.forEach(ms=>{
    ms.angle+=ms.sp;
    ms.m.position.x=Math.cos(ms.angle)*5.5;
    ms.m.position.y=Math.sin(ms.angle+ms.ph)*2.8;
    ms.m.rotation.y=ms.angle+Math.PI/2;
    ms.m.rotation.z=-Math.PI*.25+Math.sin(ms.angle)*.08;
  });

  // NAVE
  shipG.position.x=Math.sin(t*.07)*2.5;
  shipG.rotation.z=Math.sin(t*.09)*.04;
  shipG.rotation.y+=.003;

  // DRONE
  droneG.position.x=Math.sin(t*.14)*2;
  droneG.position.y=4.5+Math.sin(t*.18)*.25;
  droneG.rotation.y+=.018;
  droneG.children.forEach(c=>{if(c.userData.isRotor)c.rotation.y+=.25;});

  base.rotation.y=Math.sin(t*.04)*.016;
  base.rotation.x=Math.sin(t*.033)*.011;

  L1.position.set(5+Math.sin(t*.1)*2,7+Math.cos(t*.08)*1.5,10);
  L1.intensity=560+Math.sin(t*1.1)*110;
  L2.position.set(-6+Math.cos(t*.09)*2,-4+Math.sin(t*.07)*1.5,7);
  L2.intensity=320+Math.cos(t*.9)*75;

  renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
