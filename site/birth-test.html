<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"/><style>*{margin:0;padding:0}body{overflow:hidden;background:#000}</style></head>
<body>
<script type="module">
import * as THREE from '/three.module.js';
const W=window.innerWidth,H=window.innerHeight;
const renderer=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x000000,1);
document.body.appendChild(renderer.domElement);
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(70,W/H,.01,200);
camera.position.set(0,0,9);camera.lookAt(0,0,0);

const L1=new THREE.SpotLight(0xffffff,400,50,.3,.2);
L1.position.set(5,7,10);scene.add(L1);
const L2=new THREE.PointLight(0xffaacc,200,30);L2.position.set(-5,-3,6);scene.add(L2);
const L3=new THREE.PointLight(0xffffff,150,25);L3.position.set(0,5,-4);scene.add(L3);
scene.add(new THREE.AmbientLight(0x0a0a0a));

const world=new THREE.Group();scene.add(world);

// sfera centrale scura
const bg=new THREE.SphereGeometry(2.5,48,36);
const bp=bg.attributes.position;
for(let i=0;i<bp.count;i++){
  const x=bp.getX(i),y=bp.getY(i),z=bp.getZ(i);
  const n=Math.sin(x*4+y*3.2)*Math.cos(y*3.6+z*4)*.18;
  bp.setXYZ(i,x+n*.3,y+n*.4,z+n*.2);
}
bg.computeVertexNormals();
world.add(new THREE.Mesh(bg,new THREE.MeshStandardMaterial({color:0x060010,roughness:.92,metalness:.08})));

// ============================================
// NASCITA — sfere piccole rosa/bianche
// emergono dalla sfera e orbitano dolcemente
// ============================================

// sfere nascita — diverse dimensioni
const birthSpheres=[];
const nBirth=8; // esempio — in produzione dipende dalle notizie

for(let i=0;i<nBirth;i++){
  const g=new THREE.Group();
  
  // sfera principale — rosa/bianco perlato
  const r=.12+Math.random()*.1;
  const brightness=Math.random();
  const col=brightness<.5?
    new THREE.Color(1,.7,.85): // rosa
    new THREE.Color(.95,.95,1); // bianco perla
  
  const mat=new THREE.MeshStandardMaterial({
    color:col,
    emissive:col,
    emissiveIntensity:.4+Math.random()*.3,
    roughness:.15,
    metalness:.05,
    transparent:true,
    opacity:.9
  });
  
  const sphere=new THREE.Mesh(new THREE.SphereGeometry(r,16,12),mat);
  g.add(sphere);
  
  // alone luminoso attorno
  const glowMat=new THREE.MeshStandardMaterial({
    color:col,
    emissive:col,
    emissiveIntensity:.2,
    roughness:1,
    transparent:true,
    opacity:.15
  });
  const glow=new THREE.Mesh(new THREE.SphereGeometry(r*1.8,12,8),glowMat);
  g.add(glow);

  world.add(g);
  
  // distribuzione sferica — orbita attorno alla sfera
  const phi=Math.acos(1-2*(i+.5)/nBirth);
  const theta=2.399963*i;
  const orbitR=3.2+Math.random()*.4;
  
  birthSpheres.push({
    g,sphere,glow,
    phi,baseTheta:theta,
    orbitR,
    orbitSpeed:.04+Math.random()*.03,
    phaseOffset:Math.random()*Math.PI*2,
    pulseSpeed:.8+Math.random()*.5,
    pulsePh:Math.random()*6.28,
    // emerge dalla sfera — parte da dentro e va fuori
    emergeT:i*.3, // sfasato
    emerged:false
  });
}

// particelle piccole — polvere di stelle attorno
const particles=[];
for(let i=0;i<40;i++){
  const pm=new THREE.MeshStandardMaterial({
    color:0xffffff,emissive:0xffccee,emissiveIntensity:.8,roughness:1
  });
  const p=new THREE.Mesh(new THREE.SphereGeometry(.025,6,4),pm);
  world.add(p);
  const phi=Math.acos(1-2*Math.random());
  const theta=Math.random()*Math.PI*2;
  const r=2.8+Math.random()*.8;
  particles.push({
    m:p,
    phi,baseTheta:theta,r,
    speed:.06+Math.random()*.08,
    ph:Math.random()*6.28,
    pulsePh:Math.random()*6.28
  });
}

let t=0;
function animate(){
  requestAnimationFrame(animate);t+=.016;

  // SFERE NASCITA — orbitano dolcemente
  birthSpheres.forEach((b,i)=>{
    const theta=b.baseTheta+t*b.orbitSpeed;
    const phi=b.phi+Math.sin(t*.15+b.phaseOffset)*.2;
    
    // posizione orbitale
    const tx=Math.sin(phi)*Math.cos(theta)*b.orbitR;
    const ty=Math.cos(phi)*b.orbitR;
    const tz=Math.sin(phi)*Math.sin(theta)*b.orbitR;
    
    b.g.position.set(tx,ty,tz);
    
    // pulsazione — respiro
    const pulse=1+Math.sin(t*b.pulseSpeed+b.pulsePh)*.15;
    b.sphere.scale.setScalar(pulse);
    b.glow.scale.setScalar(pulse*1.1);
    
    // emissione pulsante — come un battito
    const ei=.3+Math.abs(Math.sin(t*b.pulseSpeed*1.5+b.pulsePh))*.5;
    b.sphere.material.emissiveIntensity=ei;
    b.glow.material.emissiveIntensity=ei*.3;
    
    // leggera rotazione
    b.g.rotation.y+=.005;
    b.g.rotation.x+=.003;
  });

  // PARTICELLE — fluttuano
  particles.forEach(p=>{
    const theta=p.baseTheta+t*p.speed;
    const phi2=p.phi+Math.sin(t*.2+p.ph)*.3;
    p.m.position.x=Math.sin(phi2)*Math.cos(theta)*p.r;
    p.m.position.y=Math.cos(phi2)*p.r;
    p.m.position.z=Math.sin(phi2)*Math.sin(theta)*p.r;
    p.m.material.emissiveIntensity=.5+Math.sin(t*2+p.pulsePh)*.4;
  });

  // sfera centrale — respiro lento
  world.rotation.y+=.003;
  world.rotation.x=Math.sin(t*.03)*.01;

  L1.position.set(5+Math.sin(t*.08)*2,7+Math.cos(t*.06)*1,10);
  L2.position.set(-5+Math.cos(t*.07)*2,-3+Math.sin(t*.05)*1,6);
  L2.color.setHSL(.9+Math.sin(t*.1)*.05,.8,.6); // rosa che varia

  renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
