<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh;font-family:'Courier New',monospace}
canvas{display:block}
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none}
#info{position:absolute;top:20px;left:20px;font-size:9px;line-height:2.2;letter-spacing:2px}
#cur{position:absolute;bottom:60px;left:20px;font-size:11px;letter-spacing:3px;font-weight:bold}
#bar{position:absolute;bottom:40px;left:20px;right:20px;height:2px;background:rgba(255,255,255,0.1)}
#fill{height:2px;width:0%;transition:none}
#wm{position:absolute;bottom:16px;right:16px;font-size:8px;letter-spacing:2px;color:rgba(255,255,255,0.2)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="info"></div>
  <div id="cur"></div>
  <div id="bar"><div id="fill"></div></div>
  <div id="wm">DATA POET · NOISE #001 · 04/07/2026</div>
</div>
<script>
const W=450,H=800;
const c=document.getElementById('c');
c.width=W;c.height=H;
const gl=c.getContext('webgl');

const VS=`attribute vec2 p;void main(){gl_Position=vec4(p,0,1);}`;
const FS=`
precision highp float;
uniform vec2 res;
uniform float time;
uniform vec3 objCol;
uniform vec3 bgCol;
uniform float sigType;
uniform float intensity;
uniform float morphT;
uniform vec3 objCol2;

float hash(vec2 p){return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453);}
float noise(vec2 p){vec2 i=floor(p);vec2 f=fract(p);f=f*f*(3.-2.*f);return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);}
float fbm(vec2 p){float v=0.;float a=.5;for(int i=0;i<5;i++){v+=a*noise(p);p*=2.1;a*=.5;}return v;}
float fbm3(vec3 p){return fbm(p.xy+p.z*1.7);}
float smin(float a,float b,float k){float h=clamp(.5+.5*(b-a)/k,0.,1.);return mix(b,a,h)-k*h*(1.-h);}
float sdCyl(vec3 p,float r,float h){vec2 d=abs(vec2(length(p.xz),p.y))-vec2(r,h);return min(max(d.x,d.y),0.)+length(max(d,0.));}

// OGGETTO basato sul segnale
float vaseR(float y){
  if(y<-0.85) return 0.16;
  if(y<-0.5) return mix(0.16,0.30,(y+0.85)/0.35);
  if(y<0.1) return mix(0.30,0.44,(y+0.5)/0.6);
  if(y<0.55) return mix(0.44,0.20,(y-0.1)/0.45);
  if(y<0.72) return mix(0.20,0.27,(y-0.55)/0.17);
  return 0.27;
}

float object(vec3 p, float sig, float t, float ity){
  vec3 wp=p;
  // deformazione per segnale
  if(sig<0.5){ // WAR — frattura
    wp+=vec3(sin(p.y*12.+t*3.)*0.04,cos(p.x*10.+t*2.8)*0.03,sin(p.z*8.+t*2.5)*0.025)*ity;
    wp.y-=max(0.,sin(t*0.8+p.x*3.))*0.04*ity;
  } else if(sig<1.5){ // POLITICS — distorce
    wp.x+=sin(p.y*8.+t*2.)*0.05*ity*(wp.x>0.?1.8:0.3);
  } else if(sig<2.5){ // TECH — glitch
    wp.x+=floor(sin(p.y*15.+t*4.)*4.)/4.*0.03*ity;
  } else if(sig<3.5){ // CULTURE — pulsa
    wp+=normalize(p)*sin(length(p)*6.-t*3.)*0.025*ity;
  } else { // HUMAN — melt
    wp.y-=max(0.,sin(t*0.5+p.x*2.))*0.035*ity;
    wp+=vec3(sin(p.y*4.+t)*0.02,0.,0.)*ity;
  }

  float r=vaseR(wp.y);
  float tex=fbm(vec2(atan(wp.x,wp.z)*3.,wp.y*5.+t*0.05))*0.015;
  float body=length(wp.xz)-(r+tex);
  float hole=sdCyl(wp-vec3(0.,.65,0.),.17,.18);
  float base=sdCyl(wp-vec3(0.,-.9,0.),.20,.05);
  float d=body;
  d=max(d,-hole);
  d=smin(d,base,.03);
  return d;
}

vec2 scene(vec3 p, float sig, float t, float ity){
  float dO=object(p,sig,t,ity);
  float dF=p.y+0.95;
  if(dO<dF) return vec2(dO,1.);
  return vec2(dF,2.);
}
vec3 norm(vec3 p,float sig,float t,float ity){
  vec2 e=vec2(.001,0.);
  return normalize(vec3(
    scene(p+e.xyy,sig,t,ity).x-scene(p-e.xyy,sig,t,ity).x,
    scene(p+e.yxy,sig,t,ity).x-scene(p-e.yxy,sig,t,ity).x,
    scene(p+e.yyx,sig,t,ity).x-scene(p-e.yyx,sig,t,ity).x
  ));
}
float shad(vec3 ro,vec3 rd,float sig,float t,float ity){
  float r=1.;float tt=0.02;
  for(int i=0;i<24;i++){
    float h=scene(ro+rd*tt,sig,t,ity).x;
    if(h<.001) return 0.;
    r=min(r,8.*h/tt);tt+=h;if(tt>4.) break;
  }
  return r;
}
float ao(vec3 p,vec3 n,float sig,float t,float ity){
  float o=0.;float s=1.;
  for(int i=0;i<5;i++){float h=.01+.12*float(i)/4.;float d=scene(p+h*n,sig,t,ity).x;o+=(h-d)*s;s*=.95;}
  return clamp(1.-3.*o,0.,1.);
}

void main(){
  vec2 uv=(gl_FragCoord.xy/res-.5)*vec2(1.,res.y/res.x)*2.;

  // colore interpolato
  vec3 col1=objCol;
  vec3 col2=objCol2;
  vec3 curCol=mix(col1,col2,morphT);
  vec3 bg=mix(bgCol,mix(bgCol,vec3(0.02,0.02,0.03),0.5),clamp(uv.y*.5+.5,0.,1.));

  // camera
  float camR=2.4+sin(time*0.08)*0.15;
  vec3 ro=vec3(sin(time*0.15)*0.4,0.18,camR);
  vec3 ta=vec3(0.,-0.05,0.);
  vec3 ww=normalize(ta-ro);
  vec3 uu=normalize(cross(ww,vec3(0,1,0)));
  vec3 vv=cross(uu,ww);
  vec3 rd=normalize(uv.x*uu+uv.y*vv+1.8*ww);

  // luce solare — colore dal segnale
  vec3 sunDir=normalize(vec3(1.2,0.8,-0.6));
  vec3 sunCol=mix(curCol*1.8+vec3(0.4),vec3(1.,0.9,0.7),0.4);
  vec3 skyCol=mix(bg,vec3(0.15,0.2,0.35),0.3);

  // cielo
  float sk=max(0.,rd.y);
  vec3 sky=mix(bg,skyCol,pow(sk,0.4));
  sky+=sunCol*pow(max(0.,dot(rd,sunDir)),16.)*0.6;
  vec3 finalCol=sky;

  vec2 hit=vec2(0.);float t2=0.;bool found=false;
  for(int i=0;i<96;i++){
    vec3 p=ro+rd*t2;
    hit=scene(p,sigType,time,intensity);
    if(hit.x<.001){found=true;break;}
    if(t2>10.) break;
    t2+=hit.x*.88;
  }

  if(found){
    vec3 p=ro+rd*t2;
    vec3 n=norm(p,sigType,time,intensity);
    float sd=shad(p+n*.002,sunDir,sigType,time,intensity);
    float occ=ao(p,n,sigType,time,intensity);
    float diff=max(0.,dot(n,sunDir));
    float skyd=max(0.,dot(n,vec3(0,1,0)))*.45;
    vec3 hal=normalize(sunDir-rd);
    float spec=pow(max(0.,dot(n,hal)),72.);
    float fres=pow(1.-max(0.,dot(-rd,n)),4.);

    vec3 matCol;
    if(hit.y<1.5){
      // OGGETTO — materiale dal segnale
      float clay=fbm(vec2(atan(p.x,p.z)*3.5,p.y*6.+time*0.04));
      vec3 vc=mix(curCol*.6,curCol,clay);
      float vein=smoothstep(.35,.65,fbm(vec2(atan(p.x,p.z)*7.,p.y*9.)));
      vc=mix(vc,curCol*.2,vein*.5);
      float curv=clamp(dot(n,normalize(vec3(p.x,0.,p.z)))*.5+.5,0.,1.);
      vc=mix(vc*.35,vc,curv);
      matCol=vc*(diff*sd*sunCol*2.+skyd*skyCol*occ+curCol*.08);
      matCol+=sunCol*spec*sd*.7;
      matCol+=skyCol*fres*.2;
    } else {
      // PAVIMENTO
      float asp=fbm(p.xz*5.)*.5+.5;
      vec3 rc=mix(vec3(.08,.08,.09),vec3(.18,.17,.16),asp);
      float crack=smoothstep(.46,.5,fbm(p.xz*2.2));
      rc=mix(rc,vec3(.04,.04,.05),crack*.5);
      // linea centrale
      float line=smoothstep(.01,.025,abs(fract(p.x*.35+.25)-.5)-.2);
      rc=mix(curCol*.4,rc,line);
      matCol=rc*(diff*sd*sunCol*1.2+skyd*skyCol*occ+.03);
      // rifesso oggetto sul pavimento
      float wet=exp(-length(p.xz)*1.8)*.2;
      matCol+=curCol*wet;
      matCol+=sunCol*spec*sd*.15;
    }

    float fog=1.-exp(-t2*.05);
    finalCol=mix(matCol,sky,fog);
    // alone colorato
    float rim=pow(1.-max(0.,dot(n,normalize(ro-p))),3.)*.3;
    finalCol+=curCol*rim*.5;
  }

  // grain
  finalCol+=vec3((hash(gl_FragCoord.xy+time)-.5)*.02);
  // ACES
  finalCol=finalCol*(2.51*finalCol+.03)/(finalCol*(2.43*finalCol+.59)+.14);
  finalCol=pow(clamp(finalCol,0.,1.),vec3(.4545));
  gl_FragColor=vec4(finalCol,1.);
}`;

function sh(t,s){const x=gl.createShader(t);gl.shaderSource(x,s);gl.compileShader(x);if(!gl.getShaderParameter(x,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(x));return x;}
const prog=gl.createProgram();
gl.attachShader(prog,sh(gl.VERTEX_SHADER,VS));
gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog);gl.useProgram(prog);
const buf=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,buf);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
const pl=gl.getAttribLocation(prog,'p');
gl.enableVertexAttribArray(pl);gl.vertexAttribPointer(pl,2,gl.FLOAT,false,0,0);
const uR=gl.getUniformLocation(prog,'res');
const uT=gl.getUniformLocation(prog,'time');
const uC=gl.getUniformLocation(prog,'objCol');
const uC2=gl.getUniformLocation(prog,'objCol2');
const uBg=gl.getUniformLocation(prog,'bgCol');
const uSig=gl.getUniformLocation(prog,'sigType');
const uInt=gl.getUniformLocation(prog,'intensity');
const uMt=gl.getUniformLocation(prog,'morphT');
gl.uniform2f(uR,W,H);

const SIGNALS=[
  {t:'2026 Iran war',   c:'war',     type:0, col:[0.92,0.04,0.01], bg:[0.08,0.01,0.01], v:0.95},
  {t:'Trump Threats',   c:'war',     type:0, col:[0.85,0.03,0.01], bg:[0.06,0.01,0.01], v:0.88},
  {t:'F-35 Got Hit',    c:'war',     type:0, col:[0.78,0.03,0.01], bg:[0.05,0.01,0.01], v:0.82},
  {t:'Donald Trump',    c:'politics',type:1, col:[0.85,0.65,0.0],  bg:[0.08,0.06,0.01], v:0.85},
  {t:'Iran Negotiations',c:'politics',type:1,col:[0.5,0.03,0.9],   bg:[0.04,0.01,0.08], v:0.78},
  {t:'Tucker Carlson',  c:'politics',type:1, col:[0.42,0.03,0.78], bg:[0.04,0.01,0.07], v:0.65},
  {t:'Artemis II',      c:'tech',    type:2, col:[0.0,0.7,1.0],    bg:[0.01,0.03,0.08], v:0.70},
  {t:'MegaTrain LLMs',  c:'tech',    type:2, col:[0.0,0.6,0.95],   bg:[0.01,0.02,0.07], v:0.68},
  {t:'WrestleMania 42', c:'culture', type:3, col:[1.0,0.6,0.0],    bg:[0.08,0.05,0.01], v:0.60},
  {t:'Kanye West',      c:'culture', type:3, col:[0.95,0.5,0.0],   bg:[0.07,0.04,0.01], v:0.65},
  {t:'Deaths in 2026',  c:'human',   type:4, col:[0.0,0.8,0.35],   bg:[0.01,0.06,0.03], v:0.75},
  {t:'Christina Koch',  c:'human',   type:4, col:[0.0,0.7,0.3],    bg:[0.01,0.05,0.02], v:0.68},
];

let sigIdx=0,sigTimer=0,t=0;
const SIG_DUR=4.0;

function updateHUD(sig,next,mt){
  const r=Math.round,c=sig.col;
  const hex=`rgb(${r(c[0]*255)},${r(c[1]*255)},${r(c[2]*255)})`;
  document.getElementById('info').style.color=hex;
  document.getElementById('info').innerHTML=`NOISE — 04/07/2026<br>${sig.c.toUpperCase()} · ${Math.round(sig.v*100)}%<br>TENSION: CRITICAL`;
  document.getElementById('cur').style.color=hex;
  document.getElementById('cur').textContent='▶ '+sig.t;
  document.getElementById('fill').style.background=hex;
  document.getElementById('fill').style.width=(mt*100)+'%';
}

(function frame(){
  requestAnimationFrame(frame);
  t+=0.016;sigTimer+=0.016;
  if(sigTimer>=SIG_DUR){sigTimer=0;sigIdx=(sigIdx+1)%SIGNALS.length;}
  const mt=sigTimer/SIG_DUR;
  const sig=SIGNALS[sigIdx];
  const next=SIGNALS[(sigIdx+1)%SIGNALS.length];
  updateHUD(sig,next,mt);
  const nc=next.col,sc=sig.col;
  const bg=sig.bg;
  gl.uniform1f(uT,t);
  gl.uniform3fv(uC,sc);
  gl.uniform3fv(uC2,nc);
  gl.uniform3fv(uBg,bg);
  gl.uniform1f(uSig,sig.type);
  gl.uniform1f(uInt,sig.v);
  gl.uniform1f(uMt,mt);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
})();
</script>
</body>
</html>
