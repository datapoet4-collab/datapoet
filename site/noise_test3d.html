<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}
</script>
<style>
*{margin:0;padding:0}
body{background:#000;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}
#loading{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:#ff1400;font-family:'Courier New',monospace;font-size:11px;letter-spacing:3px;text-align:center;z-index:10}
#hud{position:fixed;bottom:20px;left:20px;color:rgba(255,20,0,0.7);font-family:'Courier New',monospace;font-size:9px;letter-spacing:2px;pointer-events:none;line-height:2}
</style>
</head>
<body>
<div id="loading">NOISE — DATA POET<br><span id="ls">LOADING...</span></div>
<div id="hud">WAR · CRITICAL · 95%<br>▶ Trump Threats<br>04/07/2026</div>
<script type="module">
import * as THREE from 'three';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';

const W=450,H=800;
const renderer=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
renderer.setSize(W,H);
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=2.2;
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0xff0000);
scene.fog=new THREE.FogExp2(0x880000,0.035);

const camera=new THREE.PerspectiveCamera(45,W/H,0.001,200);
camera.position.set(0,0,12);
camera.lookAt(0,0,0);

// LUCI cinematiche
const amb=new THREE.AmbientLight(0x330000,5);scene.add(amb);
const key=new THREE.SpotLight(0xff2200,900,80,Math.PI/4,0.08);
key.position.set(4,6,6);key.castShadow=true;
key.shadow.mapSize.width=2048;key.shadow.mapSize.height=2048;
scene.add(key);scene.add(key.target);
const fill=new THREE.PointLight(0xff0000,350,60);fill.position.set(-5,2,4);scene.add(fill);
const rim=new THREE.PointLight(0xffffff,200,70);rim.position.set(-3,8,-6);scene.add(rim);
const bot=new THREE.PointLight(0xff1100,120,35);bot.position.set(0,-5,3);scene.add(bot);
const back=new THREE.PointLight(0xff0000,80,50);back.position.set(0,0,-10);scene.add(back);

// carica texture Trump e converte in scultura monocromatica
function buildTrumpTex(imgSrc){
    return new Promise(resolve=>{
        const img=new Image();
        img.crossOrigin='anonymous';
        img.onload=()=>{
            const cv=document.createElement('canvas');
            cv.width=1024;cv.height=1024;
            const ctx=cv.getContext('2d');
            // centra il volto
            const s=Math.min(img.width,img.height);
            const sx=(img.width-s)/2;
            const sy=Math.max(0,(img.height-s)/4);
            ctx.drawImage(img,sx,sy,s,s,0,0,1024,1024);
            // converti in scultura monocromatica rossa stile Fischer/immagine 4
            const id=ctx.getImageData(0,0,1024,1024);
            const d=id.data;
            for(let i=0;i<d.length;i+=4){
                // luminanza
                const lum=(d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114);
                // contrasto alto — scultura
                const c=Math.pow(lum/255,0.65)*255;
                // monocromatico rosso — esattamente come immagine 4 ma rossa
                d[i]=Math.min(255,c*1.0);    // R dominante
                d[i+1]=c*0.05;               // G quasi zero
                d[i+2]=c*0.01;               // B quasi zero
            }
            ctx.putImageData(id,0,0);
            resolve(new THREE.CanvasTexture(cv));
        };
        img.onerror=()=>resolve(null);
        img.src=imgSrc;
    });
}

const trumpTex=await buildTrumpTex('/face_trump.jpg');

// materiale scultura — come immagine 1 e 4 ma monocromatico rosso
const mat=new THREE.MeshStandardMaterial({
    color:new THREE.Color(1.0,0.06,0.02),
    //map:trumpTex,
    roughness:0.95,
    metalness:0.0,
    emissive:new THREE.Color(0.3,0.01,0.0),
    emissiveIntensity:0.0,
    //emissiveMap:trumpTex,
});

const faceMeshes=[];
let model=null;

const loader=new GLTFLoader();
loader.load('/face_real.glb',gltf=>{
    model=gltf.scene;
    const box=new THREE.Box3().setFromObject(model);
    const size=new THREE.Vector3();
    const center=new THREE.Vector3();
    box.getSize(size);box.getCenter(center);
    const sc=2.0/Math.max(size.x,size.y,size.z);
    model.scale.setScalar(sc);
    model.position.set(
        -center.x*sc,
        -center.y*sc - 4.5,
        -center.z*sc
    );
    model.traverse(child=>{
        if(child.isMesh){
            child.material=mat;
            child.castShadow=true;
            child.receiveShadow=true;
            child._orig=new Float32Array(child.geometry.attributes.position.array);
            faceMeshes.push(child);
        }
    });
    scene.add(model);
    document.getElementById('loading').style.display='none';
},xhr=>{
    document.getElementById('ls').textContent=Math.round(xhr.loaded/(xhr.total||1)*100)+'%';
},err=>console.error(err));

let t=0;
function animate(){
    requestAnimationFrame(animate);
    t+=0.016;

    // DEFORMAZIONE WAR — frattura scultura
    faceMeshes.forEach(mesh=>{
        const pos=mesh.geometry.attributes.position;
        const orig=mesh._orig;if(!orig)return;
        for(let i=0;i<pos.count;i++){
            const ox=orig[i*3],oy=orig[i*3+1],oz=orig[i*3+2];
            const len=Math.sqrt(ox*ox+oy*oy+oz*oz)||0.001;
            const nx=ox/len,ny=oy/len,nz=oz/len;
            const w=Math.sin(nx*8+t*1.2)*0.008
                   +Math.abs(Math.sin(ny*10+t*1.5))*0.006
                   +Math.sin(nz*6+t*1.0)*0.004;
            pos.setXYZ(i,ox+nx*w*len*8,oy+ny*w*len*8,oz+nz*w*len*8);
        }
        pos.needsUpdate=true;
        mesh.geometry.computeVertexNormals();
    });

    if(model){
        model.rotation.y=Math.sin(t*0.15)*0.2;
        model.rotation.x=0;
        model.rotation.z=Math.sin(t*0.22)*0.05;
        model.position.y=-4.5+Math.sin(t*0.9)*0.12;
    }

    // camera orbit lenta
    camera.position.x=0;
    camera.position.z=Math.cos(t*0.04)*12;
    camera.lookAt(0,-1,0);

    key.intensity=900+Math.sin(t*2)*250;
    fill.intensity=350+Math.sin(t*1.8)*100;
    bot.intensity=120+Math.sin(t*2.2)*40;

    renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
